<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InSpace</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body { background:#0a0a0a; color:#fff; line-height:1.6; scroll-behavior:smooth; }
a { color:inherit; text-decoration:none; }
a:hover { opacity:0.7; }

/* Header */
header { position:sticky; top:0; background:#111; display:flex; justify-content:center; gap:30px; padding:20px 0; z-index:10; }
header a { font-weight:500; cursor:pointer; font-size:1em; transition:0.2s; }
header a:hover { transform:scale(1.05); opacity:0.7; }

/* Sections */
section { padding:80px 20px; max-width:1000px; margin:0 auto; }
.hero { text-align:center; }
.hero h1 { font-size:2.5em; margin-bottom:20px; }
.hero p { font-size:1.2em; max-width:700px; margin:0 auto 30px; color:#ccc; }

/* Watch Launch button */
.stream-link { font-size:1.5em; padding:15px 40px; border:2px solid #fff; border-radius:12px; cursor:pointer; transition:0.3s; color:#fff; display:inline-block; margin-bottom:60px; }
.stream-link:hover { background:#fff; color:#0a0a0a; transform:scale(1.05); }

/* Rockets cards */
.rocket-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; margin-top:20px; }
.rocket { background:#111; border:1px solid #222; border-radius:10px; padding:20px; transition:0.3s; }
.rocket:hover { background:#1a1a1a; transform:translateY(-5px); box-shadow:0 5px 15px rgba(255,255,255,0.05); }
.rocket h3 { margin-bottom:10px; }
.rocket p { font-size:0.95em; color:#ccc; }

/* Кнопки фильтров (Добавлено) */
.filter-nav { display: flex; gap: 10px; margin-bottom: 20px; }
.filter-btn { padding: 6px 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; cursor: pointer; font-size: 0.85em; transition: 0.2s; }
.filter-btn:hover { background: #222; }
.filter-btn.active { background: #fff; color: #000; }

/* Launch Schedule — Улучшенный компактный дизайн */
#launch-list { margin-top:10px; display:flex; flex-direction:column; gap:8px; }

.launch-row {
  display: grid;
  grid-template-columns: 2fr 1.8fr 1fr 1fr;
  align-items: center;
  padding: 12px 18px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  transition: all 0.2s ease;
}

.launch-row:hover { background: rgba(255, 255, 255, 0.06); transform: scale(1.02); }
.launch-row strong { font-size: 0.95em; color: #fff; }
.launch-row div { font-size: 0.85em; }

.status-badge {
  text-align: center;
  font-size: 0.75em;
  font-weight: 700;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 6px;
  background: rgba(0, 0, 0, 0.3);
  cursor: pointer;
  justify-self: end;
  min-width: 100px;
}

@media (max-width: 768px) {
  .launch-row { grid-template-columns: 1.5fr 1fr; gap: 8px; }
  .status-badge { grid-column: span 2; justify-self: start; }
}

/* Contact & Footer */
.contact p, .contact a { color:#ccc; margin-bottom:5px; }
footer { text-align:center; padding:20px; border-top:1px solid #333; font-size:0.85em; color:#aaa; }
</style>
</head>
<body>

<header>
  <a onclick="scrollToSection('hero')">Home</a>
  <a onclick="scrollToSection('rockets')">News</a>
  <a onclick="scrollToSection('schedule')">Schedule</a>
  <a onclick="scrollToSection('contact')">Contact</a>
</header>

<section class="hero" id="hero">
  <h1>Welcome to InSpace</h1>
  <p>Keep an eye out for updates</p>
  <div class="stream-link" onclick="window.open('https://www.youtube.com/@hi9eS')">Watch Launch</div>
</section>

<section id="rockets">
  <h2>Latest News</h2>
  <div class="rocket-cards" id="rocket-cards"></div>
</section>

<section id="schedule">
  <h2>Launch Schedule</h2>
  
  <!-- Кнопки-фильтры -->
  <div class="filter-nav">
    <button class="filter-btn active" onclick="setFilter(null, this)">All</button>
    <button class="filter-btn" onclick="setFilter('Completed', this)">Completed</button>
    <button class="filter-btn" onclick="setFilter('Planned', this)">Planned</button>
  </div>

  <div id="launch-list"></div>
</section>

<section class="contact" id="contact">
  <h2>Contact</h2>
  <p>Twitter: <a href="https://x.com" target="_blank">@OXeallCorp</a></p>
</section>

<footer>&copy; 2026 InSpace. All rights reserved.</footer>

<script>
// --- ВСЯ ВАША СТРУКТУРА СКРИПТА СОХРАНЕНА БЕЗ ИЗМЕНЕНИЙ ---

function scrollToSection(id){ document.getElementById(id).scrollIntoView({behavior:'smooth'}); }

// Статусы и цвета
function statusColor(status){
  switch(status){
    case 'Planned': return '#fff';       // белый
    case 'Delayed': return '#ffcc00';    // жёлтый
    case 'Delayed +1h 15m': return '#ffcc00';    // жёлтый
    case 'Delayed to ': return '#ffcc00';    // жёлтый
    case 'Completed': return '#00cc66';  // зелёный
    case 'Concept/Plan': return '#00ccff'; // голубой
    case 'Canceled': return '#ff3300';   // красный
    case 'Coming Soon': return '#d9d9d9';   // For Moon
    case 'Recorded': return '#00cc66';   // красный
    default: return '#ccc';
  }
}

// Rockets data с датой новости
const rockets = [
  {
    name:'SunPower One',
    description:'Where it all began. The name "SunPower" was coined on the fly by Haisess.',
    date:'February 26, 2026'
  },
  {
    name:'SunOrbit One',
    description:'Orbiting platform built in stages. Features docking capabilities, solar panels, and communication systems.',
    date:'February 26, 2026'
  },
  {
    name:'Trial Mission to the Moon',
    description:'The team is preparing for a trial run of the upcoming lunar mission.',
    date:'February 27, 2026'
  },
  {
    name:'Beyond Earth Orbit',
    description:'<p><i>“We’re ready to move beyond Earth’s pull, coming very soon.”</i></p>',
    date:'February 27, 2026'
  },
  {
    name:'Cancelling Missions',
    description:'Resumption is coming soon.. We are currently preparing for two targets: Mars and the Moon.',
    date:'March 03, 2026'
  },
  {
    name:'Vertical Recovery: The Mark of Precision',
    description:'<p><i>“Where others leave a crater, we leave our mark.”</i></p>',
    date:'March 6, 2026'
  }
];
document.getElementById('rocket-cards').innerHTML = rockets.map(r => `
  <div class="rocket">
    <h3>${r.name}</h3>
    <p>${r.description}</p>
    <p style="font-size:0.85em; color:#888; margin-top:8px;">${r.date}</p>
  </div>
`).join('');

// --- Launches data (easy-to-edit block) ---
const launches = [
  {
    rocket: 'SunPower One (Gen 3)',
    date: '2026-03-01 04:00',
    status: 'Canceled',
    site: 'DSC Large Pad',
    flights: 0,
    description: 'New plans. Cancelled.',
    type: 'Test'
  },
  {
    rocket: 'SunOrbit One (Gen 1) (B-I)',
    date: '2026-03-02 13:00',
    status: 'Canceled',
    site: 'DSC Large Pad',
    flights: 0,
    description: 'Trial Mission to the Moon.',
    type: 'Trial Mission'
  },
  {
    rocket: 'SunPower One (Gen 4)',
    date: '2026-03-03 07:00',
    status: 'Canceled',
    site: 'DSC Large Pad',
    flights: 0,
    description: 'New plans. Cancelled.',
    type: 'Test'
  },
  {
    rocket: 'SunOrbit One (Gen 1)',
    date: '2026-03-06 01:00',
    status: 'Canceled',
    site: 'Ali 28R',
    flights: 0,
    description: 'Mission to create a station in orbit.',
    type: 'Official'
  },
  {
    rocket: 'SunPower II (Gen 1)',
    date: '2026-03-07 04:00',
    status: 'Canceled',
    site: 'Ali 28R',
    flights: 0,
    description: 'Next-generation heavy configuration test.',
    type: 'Official'
  },
  {
    rocket: 'SunOrbit One (Gen 3.6)',
    date: '2026-03-11 03:45',
    status: 'Completed',
    site: 'Main Pad',
    flights: 0,
    description: 'Test SO-1 Separation test',
    type: 'SO-1 Separation and Landing Test'
  },
  {
    rocket: 'SunOrbit One (Gen 75)',
    date: '2026-03-21 06:00',
    status: 'Completed',
    site: 'Main Pad',
    flights: 0,
    description: 'Test SO-1 Separation test',
    type: 'SO-1 Separation and Landing Test'
  },
  {
    rocket: 'SunOrbit One (Gen 84.4)',
    date: '2026-03-29 17:00',
    status: 'Completed',
    site: 'Main Pad',
    flights: 0,
    description: 'Test SO-1 Separation test',
    type: 'SO-1 Separation and Landing Test'
  },
  {
    rocket: 'SunOrbit One (Gen 84.4)',
    date: '2026-03-29 21:30',
    status: 'Completed',
    site: 'Main Pad',
    flights: 0,
    description: 'Test SO-1 Separation test',
    type: 'SO-1 Separation and Landing Test'
  },
  {
    rocket: 'SunOrbit One (Gen 84.9)',
    date: '2026-04-01 14:00',
    status: 'Planned',
    site: 'Main Pad',
    flights: 0,
    description: 'Test SO-1 Separation test',
    type: 'SO-1 Separation and Landing Test'
  }
];

launches.forEach(l => {
  const [d, t] = l.date.split(' ');
  const [year, month, day] = d.split('-').map(Number);
  const [hour, minute] = t.split(':').map(Number);
  l.dateObj = new Date(year, month-1, day, hour, minute);
});

// Логика рендера (адаптирована под компактность)
let currentFilter = null;

function render() {
  const list = document.getElementById('launch-list');
  const data = currentFilter ? launches.filter(l => l.status === currentFilter) : launches;

  list.innerHTML = data.map(l => `
    <div class="launch-row">
      <!-- Название: увеличили до 1.1em -->
      <div><strong style="font-size: 1.1em;">${l.rocket}</strong></div>
      
      <!-- Дата: увеличили до 1.15em и сделали полной -->
      <div style="color:#aaa; font-family:monospace; font-size:1.15em;">
        ${l.dateObj.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})}
      </div>
      
      <!-- Время: увеличили до 1.1em -->
      <div style="color:#777; font-size: 1.0em;">
        ${l.dateObj.getHours().toString().padStart(2,'0')}:${l.dateObj.getMinutes().toString().padStart(2,'0')} CDT
      </div>
      
      <div class="status-badge" style="color:${statusColor(l.status)};" onclick="setFilter('${l.status}')">
        ${l.status}
      </div>
    </div>
  `).join('');
}

function setFilter(status, btn) {
  currentFilter = status;
  if(btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  render();
}

render();
</script>
</body>
</html>
