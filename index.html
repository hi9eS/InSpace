<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InSpace</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #080808;
  --bg2: #0f0f0f;
  --bg3: #141414;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --text: #f0f0f0;
  --muted: #666;
  --muted2: #444;
  --font: 'DM Sans', 'Segoe UI', sans-serif;
  --mono: 'DM Mono', monospace;
  --ease: cubic-bezier(0.4,0,0.2,1);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);

  --hero-title-from: #ffffff;
  --hero-title-to: #a0c8ff;
  --hero-title-glow: rgba(120,180,255,0.18);
  --hero-sub-brightness: 1.38;
  --hero-sub-color: #888;

  --acc-padding-v: 17px;
  --acc-padding-h: 22px;
  --acc-font-label: 0.79em;
  --acc-font-count: 0.79em;
  --acc-dot-size: 10px;

  /* Launch Modal size — adjust here */
  --lm-width: 600px;
  --lm-cell-padding: 18px 22px;
  --lm-cell-val-size: 1.1em;

  /* News text brightness — adjust here (1 = default, 1.2 = brighter) */
  --news-text-brightness: 1.15;
}
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:var(--font); line-height:1.6; font-size:15px; overflow-x:hidden; }
a { color:inherit; text-decoration:none; }

/* ── STARFIELD ── */
#starfield, #vp-starfield { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
#vp-starfield { z-index:0; }
#news-starfield { position:absolute; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--dur,4s) var(--delay,0s) infinite ease-in-out alternate; opacity:0; }
@keyframes twinkle {
  0%   { opacity:0; transform:scale(0.8); }
  50%  { opacity:var(--op,0.5); }
  100% { opacity:0.08; transform:scale(1.1); }
}

/* ── HEADER ── */
header {
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  padding:14px 24px;
  background:rgba(8,8,8,0.88); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
header::after {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:180px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
}

/* Left side: local time */
.header-left {
  position:absolute; left:24px;
  display:flex; align-items:center; gap:8px;
}
.header-clock {
  font-family:var(--mono); font-size:0.78em; font-weight:300;
  color:var(--muted); letter-spacing:0.06em;
  white-space:nowrap;
}
.header-clock-tz {
  font-family:var(--mono); font-size:0.68em;
  color:var(--muted2); letter-spacing:0.04em;
}

/* Center: nav links */
.header-nav { display:flex; gap:4px; }
.header-nav a {
  font-size:0.85em; font-weight:400; letter-spacing:0.04em;
  padding:7px 16px; border-radius:8px; cursor:pointer; color:var(--muted);
  transition:color 0.2s, background 0.2s, transform 0.15s var(--ease-spring);
}
.header-nav a:hover { color:var(--text); transform:translateY(-1px); background:rgba(255,255,255,0.05); }
.header-nav a:active { transform:scale(0.96); }

/* Right side: social buttons */
.header-right {
  position:absolute; right:24px;
  display:flex; align-items:center; gap:8px;
}
.social-btn {
  width:32px; height:32px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.03);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--muted);
  font-size:0.78em; font-weight:500; font-family:var(--mono);
  transition:color 0.2s, border-color 0.2s, background 0.2s, transform 0.15s var(--ease-spring);
  text-decoration:none;
  flex-shrink:0;
}
.social-btn:hover { 
  color:var(--text); 
  border-color:rgba(255,255,255,0.35); 
  background:rgba(255,255,255,0.07); 
  transform: scale(1.08);
}
header a:hover { color:var(--text); transform:translateY(-1px); background:rgba(255,255,255,0.05); }
header a:active { transform:scale(0.96); }

section { padding:90px 20px; max-width:1000px; margin:0 auto; position:relative; z-index:1; }

/* ── HERO ── */
.hero { text-align:center; padding-top:130px; }
.hero h1 {
  font-size:clamp(2.5em,5.5vw,4em);
  font-weight:300; letter-spacing:-0.02em; margin-bottom:20px;
  animation:fadeUp 0.8s var(--ease) both;
  background: linear-gradient(135deg, var(--hero-title-from) 0%, var(--hero-title-to) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 26px var(--hero-title-glow)) drop-shadow(0 0 8px var(--hero-title-glow));
}
.hero p {
  font-size:1.1em; max-width:600px; margin:0 auto 36px;
  color:var(--hero-sub-color); font-weight:300;
  filter: brightness(var(--hero-sub-brightness));
  animation:fadeUp 0.8s 0.1s var(--ease) both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

/* ── COUNTDOWN ── */
#countdown-wrap {
  display:none; margin:0 auto 9px; max-width:640px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:20px; padding:28px 40px;
  position:relative; overflow:hidden;
  animation:fadeUp 0.8s 0.15s var(--ease) both;
}
#countdown-wrap::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
}
#countdown-mission { font-size:0.72em; letter-spacing:0.18em; text-transform:uppercase; color:#888; margin-bottom:10px; font-family:var(--mono); }
#countdown-label { font-size:0.85em; color:#aaa; margin-bottom:18px; font-weight:300; }
#countdown-timer { display:flex; justify-content:center; align-items:center; gap:18px; }
.cd-unit { text-align:center; min-width:52px; }
.cd-num { font-size:2.6em; font-weight:300; font-variant-numeric:tabular-nums; letter-spacing:0.04em; line-height:1; font-family:var(--mono); }
.cd-lbl { font-size:0.63em; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted2); margin-top:5px; }
.cd-sep { font-size:2em; font-weight:200; color:var(--muted2); line-height:1; padding-bottom:14px; }
.cd-sep-thin { width:1px; height:36px; background:rgba(255,255,255,0.1); align-self:center; margin-bottom:14px; }

/* ── DAYS SINCE LAST LAUNCH ── */
#days-since-wrap {
  display:none;
  margin:0 auto 13px; max-width:640px;
  text-align:center;
  animation:fadeUp 0.8s 0.18s var(--ease) both;
}
#days-since-text {
  font-size:0.72em; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--muted2);
  font-family:var(--mono);
}

/* ── WATCH BUTTON ── */
.stream-link {
  display:inline-flex; align-items:center; gap:11px;
  font-size:1.06em; font-weight:400; letter-spacing:0.07em;
  padding:16px 46px;
  border:1px solid rgba(255,255,255,0.35); border-radius:100px;
  cursor:pointer; color:#fff;
  transition:all 0.3s var(--ease);
  margin-bottom:70px; position:relative; overflow:hidden;
  animation:fadeUp 0.8s 0.2s var(--ease) both;
}
.stream-link::before {
  content:''; position:absolute; inset:0;
  background:#fff; transform:scaleX(0); transform-origin:left;
  transition:transform 0.35s var(--ease); border-radius:100px;
}
.stream-link:hover { color:#000; border-color:#fff; transform:translateY(-2px); }
.stream-link:hover::before { transform:scaleX(1); }
.stream-link-text { position:relative; z-index:1; }

h2 { font-size:1.7em; font-weight:300; letter-spacing:-0.01em; margin-bottom:36px; }

/* ── VEHICLE CARDS ── */
/* Section has more breathing room */
#fleet { padding-top:100px; padding-bottom:100px; }

.vehicle-cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:22px;
  align-items:stretch; /* equal height */
}
.vehicle-card {
  background: linear-gradient(160deg, #111 0%, #0d0d0d 100%);
  border-radius: 22px; cursor:pointer;
  transition: box-shadow 0.35s var(--ease), border-color 0.3s var(--ease);
  position:relative; overflow:hidden;
  border: 1px solid rgba(255,255,255,0.08);
  display:flex; flex-direction:column;
  /* equal height via grid align-items:stretch */
}
.vehicle-card:hover {
  box-shadow: 0 14px 44px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.13);
  border-color: rgba(255,255,255,0.13);
}
.vehicle-card:hover::after { opacity: 0.75; width: 3px; }

/* Top colour bar with a bit more height for feel */
.vc-color-bar { height:3px; background:var(--vc,#fff); opacity:0.45; flex-shrink:0; transition:opacity 0.3s; }
.vehicle-card:hover .vc-color-bar { opacity:1.0; }

/* More breathing room inside */
.vc-inner { padding:15px 20px 10px; display:flex; flex-direction:column; flex:1; }

/* Bigger gap between bar and name */
.vc-label-row { display:flex; align-items:center; gap:10px; margin-bottom:7px; margin-top:6px; }
.vc-dot { width:7px; height:7px; border-radius:50%; background:var(--vc,#fff); flex-shrink:0; opacity:0.45; transition:opacity 0.3s; }
.vehicle-card:hover .vc-dot { opacity:0.7; }
.vc-name { font-size:1.35em; font-weight:500; letter-spacing:-0.01em; line-height:1.2; }
.vc-sub { font-size:0.7em; color:var(--muted); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:28px; font-family:var(--mono); }
.vc-divider { height:1px; background:rgba(255,255,255,0.06); margin-bottom:22px; }
.vc-stat-row { display:flex; justify-content:space-between; gap:12px; margin-top:auto; }
.vc-stat { text-align:center; flex:1; }
.vc-stat-val { font-size:1.1em; font-weight:400; font-family:var(--mono); color:var(--text); letter-spacing:0.02em; }
.vc-stat-lbl { font-size:0.61em; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-top:5px; }

.vc-footer {
  display:flex; align-items:center; justify-content:flex-end;
  padding:14px 28px; border-top:1px solid rgba(255,255,255,0.05); margin-top:22px; gap:6px;
}
.vc-footer-text { font-size:0.72em; color:var(--muted2); letter-spacing:0.1em; text-transform:uppercase; font-family:var(--mono); transition:color 0.2s; }
.vc-footer-arrow { font-size:0.82em; color:var(--muted2); transition:transform 0.22s var(--ease-spring), color 0.2s; }
.vehicle-card:hover .vc-footer-text { color: rgba(255,255,255,0.55); }
.vehicle-card:hover .vc-footer-arrow { color: rgba(255,255,255,0.55); transform:translate(3px,-3px); }

/* ── VEHICLE OVERLAY ── */
#vehicle-overlay { display:none; position:fixed; inset:0; background:var(--bg); z-index:200; overflow-y:auto; opacity:0; transition:opacity 0.35s var(--ease); }
#vehicle-overlay.active { display:block; }
#vehicle-overlay.visible { opacity:1; }
.vp-header { position:sticky; top:0; background:rgba(8,8,8,0.92); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:20px; padding:18px 32px; z-index:10; }
.vp-back { background:none; border:1px solid var(--border); color:var(--muted); padding:8px 20px; border-radius:100px; cursor:pointer; font-size:0.82em; font-family:var(--font); transition:all 0.2s var(--ease); }
.vp-back:hover { background:var(--bg3); color:var(--text); border-color:var(--border-hover); transform:translateX(-2px); }
.vp-title { font-size:1em; font-weight:300; color:var(--muted); }
.vp-body { max-width:900px; margin:0 auto; padding:60px 24px 100px; animation:fadeUp 0.5s 0.05s var(--ease) both; position:relative; z-index:1; }
.vp-hero-name { font-size:clamp(2.5em,6vw,4em); font-weight:300; letter-spacing:-0.01em; margin-bottom:8px; }
.vp-hero-class { font-size:0.72em; color:var(--muted); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:48px; font-family:var(--mono); }
.vp-img-wrap { width:100%; aspect-ratio:16/7; background:var(--bg2); border:1px solid var(--border); border-radius:18px; margin-bottom:52px; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
.vp-img-wrap img { width:100%; height:100%; object-fit:cover; }
.vp-img-placeholder { font-size:0.72em; color:var(--muted2); letter-spacing:0.15em; text-transform:uppercase; font-family:var(--mono); }
.vp-section-title { font-size:0.68em; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; border-bottom:1px solid var(--border); padding-bottom:12px; font-family:var(--mono); }
.vp-specs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1px; background:rgba(255,255,255,0.07); border-radius:16px; overflow:hidden; margin-bottom:36px; }
.vp-spec { background:var(--bg3); padding:18px 20px; transition:background 0.2s; }
.vp-spec:hover { background:#1a1a1a; }
.vp-spec-lbl { font-size:0.62em; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; font-family:var(--mono); margin-bottom:6px; }
.vp-spec-val { font-size:1.25em; font-weight:300; font-family:var(--mono); color:var(--text); line-height:1.1; }
.vp-stages { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:36px; }
@media(max-width:600px){ .vp-stages { grid-template-columns:1fr; } }
.vp-stage { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:0; overflow:hidden; }
.vp-stage-title { font-size:0.65em; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); padding:14px 18px 12px; font-family:var(--mono); border-bottom:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); }
.vp-stage-rows { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(255,255,255,0.06); }
.vp-stage-cell { background:var(--bg3); padding:13px 16px; transition:background 0.2s; }
.vp-stage-cell:hover { background:#1a1a1a; }
.vp-stage-key { font-size:0.6em; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; font-family:var(--mono); margin-bottom:4px; }
.vp-stage-val { font-size:0.95em; font-weight:300; font-family:var(--mono); color:var(--text); }
.vp-desc { color:#777; font-size:1.0em; line-height:1.85; max-width:680px; font-weight:300; }

/* ── NEWS CARDS ── */
.rocket-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; margin-top:20px; }
.rocket { background:var(--bg2); border:1px solid rgba(255,255,255,0.07); border-radius:18px; padding:0; transition:transform 0.28s var(--ease-spring), box-shadow 0.28s var(--ease), border-color 0.25s; position:relative; overflow:hidden; display:flex; flex-direction:column; cursor:default; opacity:0; transform:translateY(16px); animation:newsIn 0.5s var(--ease) forwards; }
@keyframes newsIn { to { opacity:1; transform:translateY(0); } }
.rocket:hover { transform:translateY(-5px); box-shadow:0 16px 48px rgba(0,0,0,0.4); border-color:rgba(255,255,255,0.13); }
.rocket-top-bar { height:2px; background:linear-gradient(90deg,rgba(255,255,255,0.12),rgba(255,255,255,0.04)); transition:background 0.3s; }
.rocket:hover .rocket-top-bar { background:linear-gradient(90deg,rgba(255,255,255,0.28),rgba(255,255,255,0.06)); }
.rocket-body { padding:22px 22px 14px; flex:1; display:flex; flex-direction:column; }
.rocket h3 { margin-bottom:10px; font-size:0.97em; font-weight:500; letter-spacing:-0.005em; line-height:1.4; color:var(--text); }
/* Slightly brighter description text — controlled via --news-text-brightness */
.rocket p.rocket-desc { font-size:0.875em; color:#888; line-height:1.7; flex:1; filter: brightness(var(--news-text-brightness)); }
.rocket-footer { display:flex; align-items:center; justify-content:space-between; padding:12px 22px; border-top:1px solid rgba(255,255,255,0.05); margin-top:14px; }
.rocket-date { font-size:0.75em; color:#777; font-family:var(--mono); letter-spacing:0.04em; }
.rocket-details-btn { font-size:0.72em; color:var(--muted2); font-family:var(--mono); letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:color 0.2s; background:none; border:none; padding:0; display:flex; align-items:center; gap:5px; }
.rocket-details-btn .rd-arrow { transition:transform 0.22s var(--ease-spring); display:inline-block; }
.rocket:hover .rocket-details-btn { color:#aaa; }
.rocket:hover .rocket-details-btn .rd-arrow { transform:translate(2px,-2px); }

#load-more-btn { display:block; margin:24px auto 0; padding:10px 32px; background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:100px; font-size:0.85em; font-family:var(--font); cursor:pointer; transition:all 0.2s var(--ease); }
#load-more-btn:hover { background:var(--bg2); color:var(--text); border-color:var(--border-hover); }

/* ── NEWS OVERLAY ── */
#news-overlay { display:none; position:fixed; inset:0; background:var(--bg); z-index:200; overflow-y:auto; opacity:0; transition:opacity 0.35s var(--ease); }
#news-overlay.active { display:block; }
#news-overlay.visible { opacity:1; }
.np-header { position:sticky; top:0; background:rgba(8,8,8,0.92); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:20px; padding:18px 32px; z-index:10; }
.np-back { background:none; border:1px solid var(--border); color:var(--muted); padding:8px 20px; border-radius:100px; cursor:pointer; font-size:0.82em; font-family:var(--font); transition:all 0.2s var(--ease); }
.np-back:hover { background:var(--bg3); color:var(--text); border-color:var(--border-hover); transform:translateX(-2px); }
.np-header-title { font-size:1em; font-weight:300; color:var(--muted); }
.np-body { max-width:760px; margin:0 auto; padding:60px 24px 100px; animation:fadeUp 0.5s 0.05s var(--ease) both; position:relative; z-index:1; }
.np-date-tag { font-size:0.7em; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); font-family:var(--mono); margin-bottom:18px; }
.np-title { font-size:clamp(1.8em,4vw,2.8em); font-weight:300; letter-spacing:-0.01em; margin-bottom:32px; line-height:1.25; }
.np-divider { height:1px; background:var(--border); margin-bottom:36px; }
.np-text { color:#ccc; font-size:1.0em; line-height:1.9; font-weight:300; }

/* ── LAUNCH SCHEDULE ── */
#launch-list { margin-top:10px; display:flex; flex-direction:column; gap:10px; }
.launch-row { display:grid; grid-template-columns:2fr 1.8fr 1fr 1fr; align-items:center; padding:15px 20px; background:rgba(255,255,255,0.025); border:1px solid var(--border); border-radius:8px; transition:background 0.2s ease, border-color 0.2s ease, transform 0.2s ease; cursor:pointer; }
.launch-row:hover { background:rgba(255,255,255,0.05); transform:scale(1.012); border-color:var(--border-hover); }
.launch-row strong { font-size:0.97em; color:#fff; }
.launch-row div { font-size:0.87em; }
.status-badge { text-align:center; font-size:0.74em; font-weight:600; text-transform:uppercase; padding:6px 14px; border-radius:100px; background:rgba(0,0,0,0.3); border:1px solid currentColor; justify-self:end; min-width:108px; font-family:var(--mono); letter-spacing:0.06em; opacity:0.85; }
@media(max-width:768px){ .launch-row { grid-template-columns:1.5fr 1fr; gap:8px; } .status-badge { grid-column:span 2; justify-self:start; } }

.row-watch-link { display:none; font-size:0.72em; color:rgba(255,255,255,0.45); font-family:var(--mono); letter-spacing:0.08em; text-decoration:none; cursor:pointer; padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.2); transition:color 0.2s, border-color 0.2s; white-space:nowrap; align-self:center; }
.row-watch-link:hover { color:#fff; border-color:rgba(255,255,255,0.6); }
.row-watch-link.visible { display:inline-block; }

/* ── LAUNCH MODAL — slightly bigger ── */
#launch-modal-backdrop { display:none; position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); opacity:0; transition:opacity 0.3s var(--ease); align-items:center; justify-content:center; }
#launch-modal-backdrop.active { display:flex; }
#launch-modal-backdrop.visible { opacity:1; }
#launch-modal {
  background:var(--bg2); border:1px solid rgba(255,255,255,0.12);
  border-radius:22px; width:min(var(--lm-width),92vw);
  padding:0; overflow:hidden;
  transform:translateY(20px) scale(0.97);
  transition:transform 0.35s var(--ease-spring), opacity 0.3s;
  opacity:0; position:relative;
}
#launch-modal-backdrop.visible #launch-modal { transform:translateY(0) scale(1); opacity:1; }
.lm-color-bar { height:3px; opacity:0.7; }

/* ══════════════════════════════════════
   SOUND SYSTEM
   ─────────────────────────────────────
   enableSounds = master switch (true/false)
   
   Each sound entry:
     file: null → use generated tone
     file: 'my.mp3' → load from same folder
     volume: 0..1
     enabled: true/false per-sound switch
══════════════════════════════════════ */
const enableSounds = true; // ← master switch

const sounds = {
  accordion: { file: null, volume: 0.18, enabled: true, freq: 520, duration: 0.06, type: 'sine' },
  details:   { file: null, volume: 0.14, enabled: true, freq: 600, duration: 0.05, type: 'sine' },
  modal:     { file: null, volume: 0.16, enabled: true, freq: 480, duration: 0.08, type: 'triangle' },
  news:      { file: null, volume: 0.14, enabled: true, freq: 560, duration: 0.06, type: 'sine' },
  final10:   { file: null, volume: 0.25, enabled: true, freq: 880, duration: 0.12, type: 'sine' }
};

let audioCtx = null;
const audioBuffers = {};

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function preloadSounds() {
  Object.entries(sounds).forEach(([key, cfg]) => {
    if (cfg.file) {
      fetch(cfg.file)
        .then(r => r.arrayBuffer())
        .then(buf => getAudioCtx().decodeAudioData(buf))
        .then(decoded => { audioBuffers[key] = decoded; })
        .catch(() => {}); // fallback to tone if file missing
    }
  });
}

function playSound(key) {
  if (!enableSounds) return;
  const cfg = sounds[key];
  if (!cfg || !cfg.enabled) return;
  try {
    const ctx = getAudioCtx();
    if (audioBuffers[key]) {
      // File-based
      const src = ctx.createBufferSource();
      src.buffer = audioBuffers[key];
      const gain = ctx.createGain();
      gain.gain.value = cfg.volume;
      src.connect(gain); gain.connect(ctx.destination);
      src.start();
    } else {
      // Generated tone
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = cfg.type || 'sine';
      osc.frequency.setValueAtTime(cfg.freq, ctx.currentTime);
      gain.gain.setValueAtTime(cfg.volume, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + cfg.duration);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + cfg.duration + 0.01);
    }
  } catch(e) {}
}

  }
}

});

/* ── Auto-count Completed launches per vehicle nameId ── */
function launchCountFor(nameId) {
  return launches.filter(l => l.nameId === nameId && l.status === 'Completed').length;

/* ── Days since last Completed launch — правильный local time ── */
(function initDaysSince() {
  const completed = launches.filter(l => l.status === 'Completed');
  if (!completed.length) return;

  const latest = completed.reduce((a, b) => a.dateObj > b.dateObj ? a : b);

  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());   // сегодня 00:00 по местному времени

  const launchDate = new Date(
    latest.dateObj.getUTCFullYear(),
    latest.dateObj.getUTCMonth(),
    latest.dateObj.getUTCDate()
  );

  const diffMs = today.getTime() - launchDate.getTime();
  let diffDays = Math.floor(diffMs / 86400000);

  if (diffDays < 0) diffDays = 0;

  const wrap = document.getElementById('days-since-wrap');
  const text = document.getElementById('days-since-text');

  const label = diffDays === 0 
    ? 'Last launch: today' 
    : `${diffDays} day${diffDays !== 1 ? 's' : ''} since last launch`;

  text.textContent = label;
  wrap.style.display = 'block';
})();

/* ══════════════════════════════════════
   COUNTDOWN + MISSION IN PROGRESS
══════════════════════════════════════ */
(function initCountdown() {
  let currentTarget = null;

  const wrapEl    = document.getElementById('countdown-wrap');
  const labelEl   = document.getElementById('countdown-label');
  const missionEl = document.getElementById('countdown-mission');
  const dEl       = document.getElementById('cd-d');
  const hEl       = document.getElementById('cd-h');
  const mEl       = document.getElementById('cd-m');
  const sEl       = document.getElementById('cd-s');
  const dUnit     = dEl.closest('.cd-unit');
  const sepThin   = document.querySelector('.cd-sep-thin');

  const rowWatchLinks = {};

  function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }
  function showDays(show) { dUnit.style.display = show ? '' : 'none'; sepThin.style.display = show ? '' : 'none'; }

  function findNextLaunch() {
    const now = Date.now();
    return launches
      .filter(l => l.status === 'Planned' && l.endObj.getTime() > now)
      .sort((a, b) => a.dateObj - b.dateObj)[0] || null;
  }

  function tick() {
  const now = Date.now();
  if (!currentTarget) {
    currentTarget = findNextLaunch();
    if (!currentTarget) { wrapEl.style.display = 'none'; return; }
  }

  const msToLaunch = currentTarget.dateObj.getTime() - now;
  const msToEnd = currentTarget.endObj.getTime() - now;

  if (msToEnd <= 0) {
    hideRowWatch(currentTarget);
    currentTarget = null;
    currentTarget = findNextLaunch();
    if (!currentTarget) { wrapEl.style.display = 'none'; return; }
    missionEl.textContent = currentTarget.rocket;
  }

  wrapEl.style.display = 'block';
  missionEl.textContent = currentTarget.rocket;

  if (msToLaunch <= 0 && msToEnd > 0) {
    labelEl.textContent = 'Mission in progress';
    const elapsed = Math.floor((now - currentTarget.dateObj.getTime()) / 1000);
    showDays(false);
    hEl.textContent = pad(Math.floor(elapsed / 3600));
    mEl.textContent = pad(Math.floor((elapsed % 3600) / 60));
    sEl.textContent = pad(elapsed % 60);
    showRowWatch(currentTarget);
    return;
  }

  // Lite Countdown
  labelEl.textContent = 'Next launch in';
  const totalSec = Math.floor(msToLaunch / 1000);   // ← One tick
  showDays(Math.floor(totalSec / 86400) > 0);
  dEl.textContent = pad(Math.floor(totalSec / 86400));
  hEl.textContent = pad(Math.floor((totalSec % 86400) / 3600));
  mEl.textContent = pad(Math.floor((totalSec % 3600) / 60));
  sEl.textContent = pad(totalSec % 60);

  // Sound 10 to 0 
  if (totalSec <= 10 && totalSec >= 0) {
    playSound('final10');
  }

  if (currentTarget.watchUrl && totalSec <= currentTarget.showWatchMin * 60) {
    showRowWatch(currentTarget);
  } else {
    hideRowWatch(currentTarget);
  }
}

  window.registerRowWatch = function(idx, el) { rowWatchLinks[idx] = el; };
  function showRowWatch(launch) { const idx = launches.indexOf(launch); if (rowWatchLinks[idx]) rowWatchLinks[idx].classList.add('visible'); }
  function hideRowWatch(launch) { if (!launch) return; const idx = launches.indexOf(launch); if (rowWatchLinks[idx]) rowWatchLinks[idx].classList.remove('visible'); }

  currentTarget = findNextLaunch();
  if (currentTarget) { wrapEl.style.display = 'block'; missionEl.textContent = currentTarget.rocket; }
  tick();
  setInterval(tick, 1000);
})();

function openLaunchModal(idx) {
  const l = launches[idx];
  const color = statusColor(l.status);

  document.getElementById('lm-color-bar').style.background = color;
  document.getElementById('lm-dot').style.cssText = `width:8px;height:8px;border-radius:50%;background:${color};opacity:0.75;box-shadow:0 0 8px ${color}`;
  document.getElementById('lm-status-text').style.color = color;
  document.getElementById('lm-status-text').textContent = l.status;
  document.getElementById('lm-name').textContent = l.rocket;
  document.getElementById('lm-type').textContent = l.type;
  const dateStr = l.dateObj.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

    <div class="lm-cell"><div class="lm-cell-lbl">Duration</div><div class="lm-cell-val">~${l.durationMin} min</div></div>`;
  document.getElementById('lm-desc').textContent = l.desc;
  const watchRow  = document.getElementById('lm-watch-row');

  if (l.watchUrl) { watchLink.href = l.watchUrl; watchRow.style.display = ''; } else { watchRow.style.display = 'none'; }

  requestAnimationFrame(() => { requestAnimationFrame(() => backdrop.classList.add('visible')); });

}
function closeLaunchModal(e, force) {

  const backdrop = document.getElementById('launch-modal-backdrop');

  setTimeout(() => { backdrop.classList.remove('active'); document.body.style.overflow = ''; }, 320);

const groups = [

  { status:'Completed', color:'#00cc66' },
  { status:'Canceled',  color:'#ff3300' },
];
const scheduleContainer = document.getElementById('launch-list');

groups.forEach(g => {
  const items = launches.map((l, i) => ({ ...l, _idx: i })).filter(l => l.status === g.status);
  if (!items.length) return;

  const acc = document.createElement('div');
  acc.className = 'group-accordion';

  const header = document.createElement('div');
  header.className = 'group-header';
  header.innerHTML = `
    <div class="group-left">
      <div class="group-dot" style="background:${g.color};box-shadow:0 0 6px ${g.color}55;"></div>
      <span class="group-label" style="color:${g.color}">${g.status}</span>
      <span class="group-count">${items.length} launch${items.length!==1?'es':''}</span>
    </div>
    <span class="group-chevron">&#9660;</span>`;

  const rowsWrap = document.createElement('div');
  rowsWrap.className = 'group-rows';

  items.forEach(l => {
    const dateStr = l.dateObj.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const timeStr = l.dateObj.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}) + ' (local)';
    const row = document.createElement('div');
    row.className = 'launch-row';
    row.title = 'Click for details';
    const watchLinkHTML = l.watchUrl
      ? `<a class="row-watch-link" id="row-watch-${l._idx}" href="${l.watchUrl}" target="_blank" onclick="event.stopPropagation()">Watch Live &#8599;</a>`
      : '';
    row.innerHTML = `
      <div><strong>${l.rocket}</strong></div>
      <div style="color:#aaa;font-family:var(--mono);font-size:0.88em;">${dateStr}</div>
      <div style="color:#666;font-size:0.84em;font-family:var(--mono);">${timeStr}</div>
      <div style="display:flex;align-items:center;gap:14px;justify-content:flex-end;">
        ${watchLinkHTML}
        <div class="status-badge" style="color:${statusColor(l.status)};">${l.status}</div>
      </div>`;
    row.addEventListener('click', () => openLaunchModal(l._idx));
    rowsWrap.appendChild(row);
    if (l.watchUrl) {
      const el = document.getElementById(`row-watch-${l._idx}`);
      if (el) window.registerRowWatch(l._idx, el);
    }
  });

  acc.appendChild(header);
  acc.appendChild(rowsWrap);
  scheduleContainer.appendChild(acc);

  header.addEventListener('click', () => {
    playSound('accordion');
    const isOpen = acc.classList.contains('open');
    if (isOpen) {
      rowsWrap.style.maxHeight = rowsWrap.scrollHeight + 'px';
      rowsWrap.classList.remove('open');
      requestAnimationFrame(() => { rowsWrap.style.maxHeight = '0px'; });
      acc.classList.remove('open');
    } else {
      acc.classList.add('open');
      rowsWrap.style.maxHeight = rowsWrap.scrollHeight + 'px';
      rowsWrap.classList.add('open');
      rowsWrap.addEventListener('transitionend', () => {
        if (acc.classList.contains('open')) rowsWrap.style.maxHeight = 'none';
      }, { once: true });
    }
  });
});
