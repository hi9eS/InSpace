<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InSpace</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap');
/* Made by InSpace */
/* This website is for informational purposes only and does NOT engage in any commercial activity. */

/* Accordion load-more button */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #080808;
  --bg2: #0f0f0f;
  --bg3: #141414;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --text: #f0f0f0;
  --muted: #666;
  --muted2: #444;
  --font: 'DM Sans', 'Segoe UI', sans-serif;
  --mono: 'DM Mono', monospace;
  --ease: cubic-bezier(0.4,0,0.2,1);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);

  --hero-title-from: #ffffff;
  --hero-title-to: #a0c8ff;
  --hero-title-glow: rgba(120,180,255,0.18);
  --hero-sub-brightness: 1.38;
  --hero-sub-color: #888;

  --acc-padding-v: 17px;
  --acc-padding-h: 22px;
  --acc-font-label: 0.79em;
  --acc-font-count: 0.79em;
  --acc-dot-size: 10px;

  --lm-width: 600px;
  --lm-cell-padding: 18px 22px;
  --lm-cell-val-size: 1.1em;

  --news-text-brightness: 1.15;
}
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:var(--font); line-height:1.6; font-size:15px; overflow-x:hidden; }
a { color:inherit; text-decoration:none; }

#starfield, #vp-starfield { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
#vp-starfield { z-index:0; }
#news-starfield { position:absolute; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--dur,4s) var(--delay,0s) infinite ease-in-out alternate; opacity:0; }
@keyframes twinkle {
  0%   { opacity:0; transform:scale(0.8); }
  50%  { opacity:var(--op,0.5); }
  100% { opacity:0.08; transform:scale(1.1); }
}

/* ── FLYBY CANVAS ── */
#flyby-canvas {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  overflow:hidden;
}

/* ── HEADER ── */
header {
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  padding:14px 24px;
  background:rgba(8,8,8,0.88); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
header::after {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:180px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
}
.header-left { position:absolute; left:24px; display:flex; align-items:center; gap:6px; }
.header-clock {
  font-family:var(--mono); font-weight:300;
  letter-spacing:0.06em; white-space:nowrap;
}
.header-clock-tz { font-family:var(--mono); letter-spacing:0.04em; }

.header-nav { display:flex; gap:4px; }
.header-nav a {
  font-size:0.85em; font-weight:400; letter-spacing:0.04em;
  padding:7px 16px; border-radius:8px; cursor:pointer;
  transition:color 0.2s, background 0.2s, transform 0.15s var(--ease-spring);
}
.header-nav a:hover { transform:scale(0.97); background:rgba(255,255,255,0.05); }
.header-nav a:active { transform:scale(0.90); }

.header-right { position:absolute; right:24px; display:flex; align-items:center; gap:8px; }
/* ── SOCIAL BUTTONS ── */
.social-btn {
  border-radius:100px;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.04);
  display:inline-flex; 
  align-items:center; 
  justify-content:center;
  padding:7px 16px;
  cursor:pointer;
  font-weight:500; 
  font-family:var(--mono);
  font-size:0.76em;
  color:#aaa;
  transition:all 0.28s var(--ease-spring);
  text-decoration:none; 
  white-space:nowrap;
  flex-shrink:0;
  gap:7px;
}
.social-btn:hover {
  border-color:rgba(255,255,255,0.4); 
  background:rgba(255,255,255,0.09);
  color:#f0f0f0;
  transform:scale(1.05);
}
.social-btn img { 
  width:18px; 
  height:18px; 
  object-fit:contain; 
  filter:brightness(0.65); 
  transition:filter 0.25s; 
}
.social-btn:hover img { 
  filter:brightness(1.1); 
}

section { padding:90px 20px; max-width:1000px; margin:0 auto; position:relative; z-index:1; }

.hero { text-align:center; padding-top:130px; }
.hero h1 {
  font-size:clamp(2.5em,5.5vw,4em); font-weight:300; letter-spacing:-0.02em; margin-bottom:20px;
  animation:fadeUp 0.8s var(--ease) both;
  background:linear-gradient(135deg,var(--hero-title-from) 0%,var(--hero-title-to) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 26px var(--hero-title-glow)) drop-shadow(0 0 8px var(--hero-title-glow));
}
.hero p {
  font-size:1.1em; max-width:600px; margin:0 auto 36px;
  color:var(--hero-sub-color); font-weight:300; filter:brightness(var(--hero-sub-brightness));
  animation:fadeUp 0.8s 0.1s var(--ease) both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

#countdown-wrap {
  display:none; margin:0 auto 9px; max-width:640px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:20px; padding:28px 40px; position:relative; overflow:hidden;
  animation:fadeUp 0.8s 0.15s var(--ease) both;
}
#countdown-wrap::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
}
#countdown-mission { font-size:0.72em; letter-spacing:0.18em; text-transform:uppercase; color:#888; margin-bottom:10px; font-family:var(--mono); }
#countdown-label { font-size:0.85em; color:#aaa; margin-bottom:18px; font-weight:300; }
#countdown-timer { display:flex; justify-content:center; align-items:center; gap:18px; }
.cd-unit { text-align:center; min-width:52px; }
.cd-num { font-size:2.6em; font-weight:300; font-variant-numeric:tabular-nums; letter-spacing:0.04em; line-height:1; font-family:var(--mono); }
.cd-lbl { font-size:0.63em; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted2); margin-top:5px; }
.cd-sep { font-size:2em; font-weight:200; color:var(--muted2); line-height:1; padding-bottom:14px; }
/* separator between Days and Hours — toggled by JS */
.cd-sep-thin { width:1px; height:36px; background:rgba(255,255,255,0.1); align-self:center; margin-bottom:14px; }
.cd-sep-colon { font-size:2em; font-weight:200; color:var(--muted2); line-height:1; padding-bottom:14px; }

#days-since-wrap { display:none; margin:0 auto 13px; max-width:640px; text-align:center; animation:fadeUp 0.8s 0.18s var(--ease) both; }
#days-since-text { font-size:0.72em; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted2); font-family:var(--mono); }

.stream-link {
  display:inline-flex; align-items:center; gap:11px;
  font-size:1.06em; font-weight:400; letter-spacing:0.07em; padding:16px 46px;
  border:1px solid rgba(255,255,255,0.35); border-radius:100px;
  cursor:pointer; color:#fff; transition:all 0.3s var(--ease);
  margin-bottom:70px; position:relative; overflow:hidden;
  animation:fadeUp 0.8s 0.2s var(--ease) both;
}
.stream-link::before {
  content:''; position:absolute; inset:0; background:#fff;
  transform:scaleX(0); transform-origin:left; transition:transform 0.35s var(--ease); border-radius:100px;
}
.stream-link:hover { color:#000; border-color:#fff; transform:translateY(-2px); }
.stream-link:hover::before { transform:scaleX(1); }
.stream-link-text { position:relative; z-index:1; }

h2 { font-size:1.7em; font-weight:300; letter-spacing:-0.01em; margin-bottom:36px; }

/* ── VEHICLE CARDS ── */
#fleet { padding-top:100px; padding-bottom:100px; }
.vehicle-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:22px; align-items:stretch; }
.vehicle-card {
  background:linear-gradient(160deg,#111 0%,#0d0d0d 100%);
  border-radius:22px; cursor:pointer;
  transition:box-shadow 0.35s var(--ease),border-color 0.3s var(--ease);
  position:relative; overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
  display:flex; flex-direction:column;
}
.vehicle-card:hover {
  box-shadow:0 14px 44px rgba(0,0,0,0.65),0 0 0 1px rgba(255,255,255,0.13);
  border-color:rgba(255,255,255,0.13);
}
.vc-color-bar { background:var(--vc,#fff); opacity:0.45; flex-shrink:0; transition:opacity 0.3s; }
.vehicle-card:hover .vc-color-bar { opacity:1.0; }
.vc-inner { display:flex; flex-direction:column; flex:1; }
.vc-label-row { display:flex; align-items:center; gap:10px; }
.vc-dot { width:7px; height:7px; border-radius:50%; background:var(--vc,#fff); flex-shrink:0; opacity:0.45; transition:opacity 0.3s; }
.vehicle-card:hover .vc-dot { opacity:0.7; }
.vc-name { font-size:1.35em; font-weight:500; letter-spacing:-0.01em; line-height:1.2; }
.vc-sub { font-size:0.7em; color:var(--muted); letter-spacing:0.14em; text-transform:uppercase; font-family:var(--mono); }
.vc-divider { height:1px; background:rgba(255,255,255,0.06); }
.vc-stat-row { display:flex; justify-content:space-between; gap:12px; margin-top:auto; }
.vc-stat { text-align:center; flex:1; }
.vc-stat-val { font-size:1.1em; font-weight:400; font-family:var(--mono); color:var(--text); letter-spacing:0.02em; }
.vc-stat-lbl { font-size:0.61em; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-top:5px; }
.vc-footer { display:flex; align-items:center; justify-content:flex-end; border-top:1px solid rgba(255,255,255,0.05); gap:6px; }
.vc-footer-text { font-size:0.72em; color:var(--muted2); letter-spacing:0.1em; text-transform:uppercase; font-family:var(--mono); transition:color 0.2s; }
.vc-footer-arrow { font-size:0.82em; color:var(--muted2); transition:transform 0.22s var(--ease-spring),color 0.2s; }
.vehicle-card:hover .vc-footer-text { color:rgba(255,255,255,0.55); }
.vehicle-card:hover .vc-footer-arrow { color:rgba(255,255,255,0.55); transform:translate(3px,-3px); }

#vehicle-overlay { display:none; position:fixed; inset:0; background:var(--bg); z-index:200; overflow-y:auto; opacity:0; transition:opacity 0.35s var(--ease); }
#vehicle-overlay.active { display:block; }
#vehicle-overlay.visible { opacity:1; }
.vp-header { position:sticky; top:0; background:rgba(8,8,8,0.92); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:20px; padding:18px 32px; z-index:10; }
.vp-back { background:none; border:1px solid var(--border); color:var(--muted); padding:8px 20px; border-radius:100px; cursor:pointer; font-size:0.82em; font-family:var(--font); transition:all 0.2s var(--ease); }
.vp-back:hover { background:var(--bg3); color:var(--text); border-color:var(--border-hover); transform:translateX(-2px); }
.vp-title { font-size:1em; font-weight:300; color:var(--muted); }
.vp-body { max-width:900px; margin:0 auto; padding:60px 24px 100px; animation:fadeUp 0.5s 0.05s var(--ease) both; position:relative; z-index:1; }
.vp-hero-name { font-size:clamp(2.5em,6vw,4em); font-weight:300; letter-spacing:-0.01em; margin-bottom:8px; }
.vp-hero-class { font-size:0.72em; color:var(--muted); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:48px; font-family:var(--mono); }
.vp-img-wrap { width:100%; aspect-ratio:16/7; background:var(--bg2); border:1px solid var(--border); border-radius:18px; margin-bottom:52px; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
.vp-img-wrap img { width:100%; height:100%; object-fit:cover; }
.vp-img-placeholder { font-size:0.72em; color:var(--muted2); letter-spacing:0.15em; text-transform:uppercase; font-family:var(--mono); }
.vp-section-title { font-size:0.68em; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; border-bottom:1px solid var(--border); padding-bottom:12px; font-family:var(--mono); }
.vp-specs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1px; background:rgba(255,255,255,0.07); border-radius:16px; overflow:hidden; margin-bottom:36px; }
.vp-spec { background:var(--bg3); padding:18px 20px; transition:background 0.2s; }
.vp-spec:hover { background:#1a1a1a; }
.vp-spec-lbl { font-size:0.62em; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; font-family:var(--mono); margin-bottom:6px; }
.vp-spec-val { font-size:1.25em; font-weight:300; font-family:var(--mono); color:var(--text); line-height:1.1; }
.vp-stages { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:36px; }
@media(max-width:600px){ .vp-stages { grid-template-columns:1fr; } }
.vp-stage { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:0; overflow:hidden; }
.vp-stage-title { font-size:0.65em; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); padding:14px 18px 12px; font-family:var(--mono); border-bottom:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); }
.vp-stage-rows { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(255,255,255,0.06); }
.vp-stage-cell { background:var(--bg3); padding:13px 16px; transition:background 0.2s; }
.vp-stage-cell:hover { background:#1a1a1a; }
.vp-stage-key { font-size:0.6em; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; font-family:var(--mono); margin-bottom:4px; }
.vp-stage-val { font-size:0.95em; font-weight:300; font-family:var(--mono); color:var(--text); }
.vp-desc { color:#777; font-size:1.0em; line-height:1.85; max-width:680px; font-weight:300; }

/* ── NEWS ── */
.rocket-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; margin-top:20px; }
.rocket { background:var(--bg2); border:1px solid rgba(255,255,255,0.07); border-radius:18px; padding:0; transition:transform 0.28s var(--ease-spring),box-shadow 0.28s var(--ease),border-color 0.25s; position:relative; overflow:hidden; display:flex; flex-direction:column; cursor:default; opacity:0; transform:translateY(16px); animation:newsIn 0.5s var(--ease) forwards; }
@keyframes newsIn { to { opacity:1; transform:translateY(0); } }
.rocket:hover { transform:translateY(-5px); box-shadow:0 16px 48px rgba(0,0,0,0.4); border-color:rgba(255,255,255,0.13); }
.rocket-top-bar { height:2px; background:linear-gradient(90deg,rgba(255,255,255,0.12),rgba(255,255,255,0.04)); transition:background 0.3s; }
.rocket:hover .rocket-top-bar { background:linear-gradient(90deg,rgba(255,255,255,0.28),rgba(255,255,255,0.06)); }
.rocket-body { padding:22px 22px 14px; flex:1; display:flex; flex-direction:column; }
.rocket h3 { margin-bottom:10px; font-size:0.97em; font-weight:500; letter-spacing:-0.005em; line-height:1.4; color:var(--text); }
.rocket p.rocket-desc { font-size:0.875em; color:#888; line-height:1.7; flex:1; filter:brightness(var(--news-text-brightness)); }
.rocket-footer { display:flex; align-items:center; justify-content:space-between; padding:12px 22px; border-top:1px solid rgba(255,255,255,0.05); margin-top:14px; }
.rocket-date { font-size:0.75em; color:#777; font-family:var(--mono); letter-spacing:0.04em; }
.rocket-details-btn { font-size:0.72em; color:var(--muted2); font-family:var(--mono); letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:color 0.2s; background:none; border:none; padding:0; display:flex; align-items:center; gap:5px; }
.rocket-details-btn .rd-arrow { transition:transform 0.22s var(--ease-spring); display:inline-block; }
.rocket:hover .rocket-details-btn { color:#aaa; }
.rocket:hover .rocket-details-btn .rd-arrow { transform:translate(2px,-2px); }
#load-more-btn { display:block; margin:24px auto 0; padding:10px 32px; background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:100px; font-size:0.85em; font-family:var(--font); cursor:pointer; transition:all 0.2s var(--ease); }
#load-more-btn:hover { background:var(--bg2); color:var(--text); border-color:var(--border-hover); }

#news-overlay { display:none; position:fixed; inset:0; background:var(--bg); z-index:200; overflow-y:auto; opacity:0; transition:opacity 0.35s var(--ease); }
#news-overlay.active { display:block; }
#news-overlay.visible { opacity:1; }
.np-header { position:sticky; top:0; background:rgba(8,8,8,0.92); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:20px; padding:18px 32px; z-index:10; }
.np-back { background:none; border:1px solid var(--border); color:var(--muted); padding:8px 20px; border-radius:100px; cursor:pointer; font-size:0.82em; font-family:var(--font); transition:all 0.2s var(--ease); }
.np-back:hover { background:var(--bg3); color:var(--text); border-color:var(--border-hover); transform:translateX(-2px); }
.np-header-title { font-size:1em; font-weight:300; color:var(--muted); }
.np-body { max-width:760px; margin:0 auto; padding:60px 24px 100px; animation:fadeUp 0.5s 0.05s var(--ease) both; position:relative; z-index:1; }
.np-date-tag { font-size:0.7em; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); font-family:var(--mono); margin-bottom:18px; }
.np-title { font-size:clamp(1.8em,4vw,2.8em); font-weight:300; letter-spacing:-0.01em; margin-bottom:32px; line-height:1.25; }
.np-divider { height:1px; background:var(--border); margin-bottom:36px; }
.np-text { color:#ccc; font-size:1.0em; line-height:1.9; font-weight:300; }

/* ── SCHEDULE ── */
#launch-list { margin-top:10px; display:flex; flex-direction:column; gap:10px; }
.launch-row { display:grid; grid-template-columns:2fr 1.8fr 1fr 1fr; align-items:center; padding:15px 20px; background:rgba(255,255,255,0.025); border:1px solid var(--border); border-radius:8px; transition:background 0.2s ease,border-color 0.2s ease,transform 0.2s ease; cursor:pointer; }
.launch-row:hover { background:rgba(255,255,255,0.05); transform:scale(1.012); border-color:var(--border-hover); }
.launch-row strong { font-size:0.97em; color:#fff; }
.launch-row div { font-size:0.87em; }
.status-badge { text-align:center; font-size:0.74em; font-weight:600; text-transform:uppercase; padding:6px 14px; border-radius:100px; background:rgba(0,0,0,0.3); border:1px solid currentColor; justify-self:end; min-width:108px; font-family:var(--mono); letter-spacing:0.06em; opacity:0.85; }
@media(max-width:768px){ .launch-row { grid-template-columns:1.5fr 1fr; gap:8px; } .status-badge { grid-column:span 2; justify-self:start; } }

.row-watch-link { display:none; font-size:0.72em; color:rgba(255,255,255,0.45); font-family:var(--mono); letter-spacing:0.08em; text-decoration:none; cursor:pointer; padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.2); transition:color 0.2s,border-color 0.2s; white-space:nowrap; align-self:center; }
.row-watch-link:hover { color:#fff; border-color:rgba(255,255,255,0.6); }
.row-watch-link.visible { display:inline-block; }

/* Accordion load-more button */
.acc-load-more {
  display:block; margin:10px 20px 12px; padding:8px 0;
  background:transparent; border:1px solid rgba(255,255,255,0.1);
  color:var(--muted); border-radius:8px;
  font-size:0.78em; font-family:var(--mono); letter-spacing:0.06em;
  text-transform:uppercase; cursor:pointer; width:calc(100% - 40px);
  transition:all 0.2s var(--ease);
}
.acc-load-more:hover { background:rgba(255,255,255,0.04); color:var(--text); border-color:rgba(255,255,255,0.2); }

#launch-modal-backdrop { display:none; position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); opacity:0; transition:opacity 0.3s var(--ease); align-items:center; justify-content:center; }
#launch-modal-backdrop.active { display:flex; }
#launch-modal-backdrop.visible { opacity:1; }
#launch-modal { background:var(--bg2); border:1px solid rgba(255,255,255,0.12); border-radius:22px; width:min(var(--lm-width),92vw); padding:0; overflow:hidden; transform:translateY(20px) scale(0.97); transition:transform 0.35s var(--ease-spring),opacity 0.3s; opacity:0; position:relative; }
#launch-modal-backdrop.visible #launch-modal { transform:translateY(0) scale(1); opacity:1; }
.lm-color-bar { height:3px; opacity:0.7; }
.lm-inner { padding:34px 36px 32px; }
.lm-status-row { display:flex; align-items:center; gap:10px; margin-bottom:18px; }

/* ── Sound ── */
let audioCtx=null; const audioBuffers={};
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
(function preload(){Object.entries(sounds).forEach(([k,c])=>{if(c.file){fetch(c.file).then(r=>r.arrayBuffer()).then(b=>getAudioCtx().decodeAudioData(b)).then(d=>{audioBuffers[k]=d;}).catch(()=>{});}});})();
function playSound(key){
  if(!enableSounds)return; const cfg=sounds[key]; if(!cfg||!cfg.enabled)return;
  try{
    const ctx=getAudioCtx();
    if(audioBuffers[key]){const s=ctx.createBufferSource();s.buffer=audioBuffers[key];const g=ctx.createGain();g.gain.value=cfg.volume;s.connect(g);g.connect(ctx.destination);s.start();}
    else{const o=ctx.createOscillator();const g=ctx.createGain();o.type=cfg.type||'sine';o.frequency.setValueAtTime(cfg.freq,ctx.currentTime);g.gain.setValueAtTime(cfg.volume,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+cfg.duration);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+cfg.duration+0.01);}
  }catch(e){}
}

/* ── Starfield with parallax layers ── */
function createStars(container, count) {
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 1.8 + 0.3;
    // Assign depth layer: 0=far(slow), 1=mid, 2=close(faster)
    const layer = Math.floor(Math.random() * 3);
    s.dataset.layer = layer;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--op:${Math.random()*0.45+0.1};--dur:${Math.random()*5+3}s;--delay:${Math.random()*6}s;`;
    // Store base positions for parallax
    s.dataset.baseLeft = parseFloat(s.style.left);
    s.dataset.baseTop  = parseFloat(s.style.top);
    container.appendChild(s);
  }
}

createStars(document.getElementById('starfield'), 110);
let vpStarsCreated=false; function ensureVpStars(){if(vpStarsCreated)return;createStars(document.getElementById('vp-starfield'),90);vpStarsCreated=true;}
let newsStarsCreated=false; function ensureNewsStars(){if(newsStarsCreated)return;createStars(document.getElementById('news-starfield'),80);newsStarsCreated=true;}

/* ── Parallax effect ── */
(function initParallax() {
  // Parallax multipliers per layer (far → close)
  const factors = [0.004, 0.010, 0.020];

  let mouseX = 0, mouseY = 0;
  let scrollY = 0;
  let rafId = null;
  let targetMX = 0, targetMY = 0;
  let currentMX = 0, currentMY = 0;

  document.addEventListener('mousemove', e => {
    // Offset from center, normalised to -1..1
    targetMX = (e.clientX / window.innerWidth  - 0.5) * 2;
    targetMY = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  window.addEventListener('scroll', () => {
    scrollY = window.scrollY;
    scheduleUpdate();
  }, { passive: true });

  function scheduleUpdate() {
    if (!rafId) rafId = requestAnimationFrame(update);
  }

  function update() {
    rafId = null;
    // Smooth mouse interpolation
    currentMX += (targetMX - currentMX) * 0.06;
    currentMY += (targetMY - currentMY) * 0.06;

    const starfield = document.getElementById('starfield');
    const stars = starfield.querySelectorAll('.star');
    stars.forEach(s => {
      const layer = parseInt(s.dataset.layer) || 0;
      const f = factors[layer];
      const baseLeft = parseFloat(s.dataset.baseLeft);
      const baseTop  = parseFloat(s.dataset.baseTop);
      // Mouse parallax (viewport %)
      const dx = currentMX * f * 100;
      const dy = currentMY * f * 100;
      // Scroll parallax — far stars scroll slower
      const scrollFactor = [0.003, 0.008, 0.016][layer];
      const sy = (scrollY * scrollFactor);
      s.style.transform = `translate(${dx}%, calc(${dy}% - ${sy}px))`;
    });

    // Keep smooth loop while mouse is moving
    if (Math.abs(targetMX - currentMX) > 0.0005 || Math.abs(targetMY - currentMY) > 0.0005) {
      rafId = requestAnimationFrame(update);
    }
  }

  // Kick off loop
  document.addEventListener('mousemove', scheduleUpdate, { passive: true });
  window.addEventListener('scroll', scheduleUpdate, { passive: true });
})();

/* ══════════════════════════════════════
   FLYBY SYSTEM — canvas overlay
   Types: meteor | satellite | starship
══════════════════════════════════════ */
(function initFlyby() {
  const canvas = document.getElementById('flyby-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Active flyby objects
  let flyby = null;
  let animFrame = null;

  // Schedule next flyby: 15–30 seconds
  function scheduleNext() {
    const delay = (10 + Math.random() * 5) * 1000;
    setTimeout(spawnFlyby, delay);
  }

  function spawnFlyby() {
    // pick type weighted: meteor 50%, satellite 35%, starship 15%
    const r = Math.random();
    const type = r < 0.50 ? 'meteor' : r < 0.85 ? 'satellite' : 'starship';;

    // Random angle: mostly left-to-right, slight diagonal
    const angle = (Math.random() * 30 - 15) * Math.PI / 180; // ±15°
    // Slightly randomise vertical entry point
    const startY = H * (0.1 + Math.random() * 0.55);

    flyby = buildFlyby(type, angle, startY);
    if (!animFrame) animFrame = requestAnimationFrame(drawLoop);
    scheduleNext();
  }

  function buildFlyby(type, angle, startY) {
    const base = {
      type,
      x: -120,
      y: startY,
      angle,
      progress: 0, // 0..1
    };

    if (type === 'meteor') {
      return {
        ...base,
        speed: 5 + Math.random() * 4,
        tailLen: 80 + Math.random() * 60,
        brightness: 0.55 + Math.random() * 0.35,
        size: 1.2 + Math.random() * 0.8,
        duration: 1.4,    // seconds
      };
    } else if (type === 'satellite') {
      return {
        ...base,
        speed: 3 + Math.random() * 3,
        brightness: 0.30 + Math.random() * 0.20,
        size: 1.4,
        tailLen: 18,
        duration: 6,
      };
    } else { // starship
      return {
        ...base,
        speed: 3 + Math.random() * 2,
        brightness: 0.22 + Math.random() * 0.12,
        size: 3.5,
        tailLen: 28,
        duration: 5,
        // plume glow color
        plumeColor: 'rgba(120,180,255,',
      };
    }
  }

  let lastTime = null;
  function drawLoop(ts) {
    if (!lastTime) lastTime = ts;
    const dt = (ts - lastTime) / 1000;
    lastTime = ts;

    ctx.clearRect(0, 0, W, H);

    if (flyby) {
      // Advance position
      const dx = Math.cos(flyby.angle) * flyby.speed;
      const dy = Math.sin(flyby.angle) * flyby.speed;
      flyby.x += dx;
      flyby.y += dy;

      // Fade in/out envelope based on progress across screen
      const prog = flyby.x / (W + 200);
      // Envelope: quick fade-in (0..0.08), flat (0.08..0.85), fade-out (0.85..1)
      let alpha;
      if (prog < 0.08)       alpha = prog / 0.08;
      else if (prog < 0.85)  alpha = 1.0;
      else                   alpha = Math.max(0, 1 - (prog - 0.85) / 0.15);

      alpha *= flyby.brightness;

      if (flyby.x > W + 150) {
        flyby = null;
        ctx.clearRect(0, 0, W, H);
        animFrame = null;
        lastTime = null;
        return;
      }

      if (flyby.type === 'meteor') drawMeteor(flyby, alpha);
      else if (flyby.type === 'satellite') drawSatellite(flyby, alpha);
      else drawStarship(flyby, alpha);
    }

    if (flyby) animFrame = requestAnimationFrame(drawLoop);
    else animFrame = null;
  }

  /* ── Draw: meteor ── */
  function drawMeteor(f, alpha) {
    const tailX = f.x - Math.cos(f.angle) * f.tailLen;
    const tailY = f.y - Math.sin(f.angle) * f.tailLen;

    const grad = ctx.createLinearGradient(tailX, tailY, f.x, f.y);
    grad.addColorStop(0, `rgba(255,255,255,0)`);
    grad.addColorStop(0.6, `rgba(220,235,255,${alpha * 0.35})`);
    grad.addColorStop(1, `rgba(255,255,255,${alpha})`);

    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(f.x, f.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = f.size;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Head glow
    const glow = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size * 4);
    glow.addColorStop(0, `rgba(255,255,255,${alpha * 0.9})`);
    glow.addColorStop(1, `rgba(200,220,255,0)`);
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size * 4, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }

  /* ── Draw: satellite (slow dim dot, faint trail) ── */
  function drawSatellite(f, alpha) {
    // Short faint trail
    const tailX = f.x - Math.cos(f.angle) * f.tailLen;
    const tailY = f.y - Math.sin(f.angle) * f.tailLen;

    const grad = ctx.createLinearGradient(tailX, tailY, f.x, f.y);
    grad.addColorStop(0, `rgba(255,255,255,0)`);
    grad.addColorStop(1, `rgba(255,255,255,${alpha * 0.28})`);

    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(f.x, f.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 0.7;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Dot
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,235,255,${alpha})`;
    ctx.fill();

    // Occasional blink — simple sine flicker
    const blink = 0.5 + 0.5 * Math.sin(Date.now() * 0.003);
    if (blink > 0.72) {
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.size * 2.5, 0, Math.PI * 2);
      const g2 = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size * 2.5);
      g2.addColorStop(0, `rgba(180,210,255,${alpha * 0.5})`);
      g2.addColorStop(1, `rgba(180,210,255,0)`);
      ctx.fillStyle = g2;
      ctx.fill();
    }
  }

  /* ── Draw: Starship silhouette (tiny) ── */
  function drawStarship(f, alpha) {
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.angle);

    const sc = f.size * 0.9;

    // Engine plume — soft blue-white glow behind
    const plumeLen = sc * 9;
    const plume = ctx.createLinearGradient(-plumeLen, 0, 0, 0);
    plume.addColorStop(0, `rgba(120,180,255,0)`);
    plume.addColorStop(0.5, `rgba(160,210,255,${alpha * 0.18})`);
    plume.addColorStop(1, `rgba(200,225,255,${alpha * 0.32})`);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-plumeLen, -sc * 0.9);
    ctx.lineTo(-plumeLen, sc * 0.9);
    ctx.closePath();
    ctx.fillStyle = plume;
    ctx.fill();

    // Minimal Starship silhouette — dark body
    ctx.fillStyle = `rgba(210,220,235,${alpha})`;

    // Fuselage — elongated pill
    ctx.beginPath();
    ctx.ellipse(0, 0, sc * 5.5, sc * 0.85, 0, 0, Math.PI * 2);
    ctx.fill();

    // Nose cone — pointed
    ctx.beginPath();
    ctx.moveTo(sc * 5.5, 0);
    ctx.lineTo(sc * 3.5, -sc * 0.85);
    ctx.lineTo(sc * 7.5, 0);
    ctx.lineTo(sc * 3.5, sc * 0.85);
    ctx.closePath();
    ctx.fill();

    // Fin — tiny rear fin
    ctx.beginPath();
    ctx.moveTo(-sc * 4.5, 0);
    ctx.lineTo(-sc * 5.8, -sc * 1.8);
    ctx.lineTo(-sc * 3.8, -sc * 0.85);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-sc * 4.5, 0);
    ctx.lineTo(-sc * 5.8, sc * 1.8);
    ctx.lineTo(-sc * 3.8, sc * 0.85);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Short trail behind
    const trailStart = {
      x: f.x - Math.cos(f.angle) * f.tailLen,
      y: f.y - Math.sin(f.angle) * f.tailLen,
    };
    const tg = ctx.createLinearGradient(trailStart.x, trailStart.y, f.x, f.y);
    tg.addColorStop(0, `rgba(140,190,255,0)`);
    tg.addColorStop(1, `rgba(140,190,255,${alpha * 0.18})`);
    ctx.beginPath();
    ctx.moveTo(trailStart.x, trailStart.y);
    ctx.lineTo(f.x, f.y);
    ctx.strokeStyle = tg;
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Kick off scheduling after short initial delay
  setTimeout(scheduleNext, 4000 + Math.random() * 6000);
})();

/* ── Reveal & Utilities ── */
const revealObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
        if (e.isIntersecting) {
            e.target.classList.add('visible');
        }
    });
}, { threshold: 0.07 });

document.querySelectorAll('.reveal').forEach(el => {
    revealObs.observe(el);
});

function statusColor(s) {
    switch (s) {
        case 'Planned':      return '#fff';
        case 'Delayed':      return '#ffcc00';
        case 'Big Event Plans':      return '#ffcc00';
        case 'Completed':    return '#00cc66';
        case 'Concept/Plan': return '#00ccff';
        case 'Canceled':     return '#ff3300';
        case 'Coming Soon':  return '#d9d9d9';
        case 'Recorded':     return '#00cc66';
        default:             return '#ccc';
    }
}

/* Days since last launch */
(function initDaysSince(){
  const completed=launches.filter(l=>l.status==='Completed'); if(!completed.length)return;
  const latest=completed.reduce((a,b)=>a.dateObj>b.dateObj?a:b);
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const launchLocal=new Date(latest.dateObj.toLocaleDateString('en-CA'));
  const diffDays=Math.max(0,Math.floor((today-launchLocal)/86400000));
  const wrap=document.getElementById('days-since-wrap');
  const text=document.getElementById('days-since-text');
  text.textContent=diffDays<1?'<1 day since last launch':`${diffDays} day${diffDays!==1?'s':''} since last launch`;
  wrap.style.display='block';
})();

/* ══════════════════════════════════════
   COUNTDOWN LOGIC
══════════════════════════════════════ */
(function initCountdown(){
  let currentTarget=null;
  const wrapEl=document.getElementById('countdown-wrap');
  const labelEl=document.getElementById('countdown-label');
  const missionEl=document.getElementById('countdown-mission');
  const dEl=document.getElementById('cd-d');
  const hEl=document.getElementById('cd-h');
  const mEl=document.getElementById('cd-m');
  const sEl=document.getElementById('cd-s');
  const dUnit=document.getElementById('cd-days-unit');
  const sepEl=document.getElementById('cd-days-sep');
  const rowWatchLinks={};

  function pad(n){return String(Math.max(0,n)).padStart(2,'0');}
  function showDays(show){dUnit.style.display=show?'':'none';sepEl.style.display=show?'':'none';}
  function findNext(){const now=Date.now();return launches.filter(l=>l.status==='Planned'&&l.endObj.getTime()>now).sort((a,b)=>a.dateObj-b.dateObj)[0]||null;}

  function tick(){
    const now=Date.now();
    if(!currentTarget){currentTarget=findNext();if(!currentTarget){wrapEl.style.display='none';return;}}
    const msL=currentTarget.dateObj.getTime()-now;
    const msE=currentTarget.endObj.getTime()-now;
    if(msE<=0){hideRW(currentTarget);currentTarget=null;currentTarget=findNext();if(!currentTarget){wrapEl.style.display='none';return;}missionEl.textContent=currentTarget.rocket;}
    wrapEl.style.display='block'; missionEl.textContent=currentTarget.rocket;
    if(msL<=0&&msE>0){
      labelEl.textContent='Mission in progress';
      const el=Math.floor((now-currentTarget.dateObj.getTime())/1000);
      showDays(false); hEl.textContent=pad(Math.floor(el/3600)); mEl.textContent=pad(Math.floor((el%3600)/60)); sEl.textContent=pad(el%60);
      showRW(currentTarget); return;
    }
    labelEl.textContent='Next launch in';
    const ts=Math.floor(msL/1000);
    showDays(Math.floor(ts/86400)>0);
    dEl.textContent=pad(Math.floor(ts/86400)); hEl.textContent=pad(Math.floor((ts%86400)/3600));
    mEl.textContent=pad(Math.floor((ts%3600)/60)); sEl.textContent=pad(ts%60);
    if(ts<=10&&ts>=0)playSound('final10');
    if(currentTarget.watchUrl&&ts<=currentTarget.showWatchMin*60){showRW(currentTarget);}else{hideRW(currentTarget);}
  }

  window.registerRowWatch=function(idx,el){rowWatchLinks[idx]=el;};
  function showRW(l){const i=launches.indexOf(l);if(rowWatchLinks[i])rowWatchLinks[i].classList.add('visible');}
  function hideRW(l){if(!l)return;const i=launches.indexOf(l);if(rowWatchLinks[i])rowWatchLinks[i].classList.remove('visible');}

  currentTarget=findNext();
  if(currentTarget){wrapEl.style.display='block';missionEl.textContent=currentTarget.rocket;}
  tick(); setInterval(tick,1000);
})();

/* ══════════════════════════════════════
   LAUNCH MODAL
══════════════════════════════════════ */
function openLaunchModal(idx){
  const l=launches[idx]; const color=statusColor(l.status); playSound('modal');
  document.getElementById('lm-color-bar').style.background=color;
  document.getElementById('lm-dot').style.cssText=`width:8px;height:8px;border-radius:50%;background:${color};opacity:0.75;box-shadow:0 0 8px ${color}`;
  document.getElementById('lm-status-text').style.color=color;
  document.getElementById('lm-status-text').textContent=l.status;
  document.getElementById('lm-name').textContent=l.rocket;
  document.getElementById('lm-type').textContent=l.type;
  const ds=l.dateObj.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const ts=l.dateObj.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})+' local';
  document.getElementById('lm-grid').innerHTML=`
    <div class="lm-cell"><div class="lm-cell-lbl">Vehicle</div><div class="lm-cell-val">${l.vehicle}</div></div>
    <div class="lm-cell"><div class="lm-cell-lbl">Launch Site</div><div class="lm-cell-val">${l.site}</div></div>
    <div class="lm-cell"><div class="lm-cell-lbl">Date</div><div class="lm-cell-val">${ds}</div></div>
    <div class="lm-cell"><div class="lm-cell-lbl">Time</div><div class="lm-cell-val">${ts}</div></div>
    <div class="lm-cell"><div class="lm-cell-lbl">Target</div><div class="lm-cell-val">${l.target}</div></div>
    <div class="lm-cell"><div class="lm-cell-lbl">Duration</div><div class="lm-cell-val">~${l.durationMin} min</div></div>`;
  document.getElementById('lm-desc').textContent=l.desc;
  const wr=document.getElementById('lm-watch-row'); const wl=document.getElementById('lm-watch-link');
  if(l.watchUrl){wl.href=l.watchUrl;wr.style.display='';}else{wr.style.display='none';}
  const bd=document.getElementById('launch-modal-backdrop'); bd.classList.add('active');
  requestAnimationFrame(()=>{requestAnimationFrame(()=>bd.classList.add('visible'));});
  document.body.style.overflow='hidden';
}
function closeLaunchModal(e,force){
  if(!force&&e&&e.target!==document.getElementById('launch-modal-backdrop'))return;
  const bd=document.getElementById('launch-modal-backdrop'); bd.classList.remove('visible');
  setTimeout(()=>{bd.classList.remove('active');document.body.style.overflow='';},320);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLaunchModal(null,true);closeNews();closeVehicle();}});

/* ══════════════════════════════════════
   ACCORDION — with per-group Load more
══════════════════════════════════════ */
const groups = [
    { status: 'Planned',         color: '#ffffff', paginate: true },
    { status: 'Completed',       color: '#00cc66', paginate: true },
    { status: 'Canceled',        color: '#ff3300', paginate: true },
    { status: 'Big Event Plans', color: '#ffaa00', paginate: true }
];
const schedCont=document.getElementById('launch-list');

groups.forEach(g=>{
  const allItems=launches.map((l,i)=>({...l,_idx:i})).filter(l=>l.status===g.status);
  if(!allItems.length)return;

  const acc=document.createElement('div'); acc.className='group-accordion';
  const hdr=document.createElement('div'); hdr.className='group-header';
  hdr.innerHTML=`
    <div class="group-left">
      <div class="group-dot" style="background:${g.color};box-shadow:0 0 6px ${g.color}55;"></div>
      <span class="group-label" style="color:${g.color}">${g.status}</span>
      <span class="group-count">${allItems.length} launch${allItems.length!==1?'es':''}</span>
    </div>
    <span class="group-chevron">&#9660;</span>`;

  const rw=document.createElement('div'); rw.className='group-rows';

  let visibleCount=g.paginate?Math.min(accLoadMorePerPage,allItems.length):allItems.length;
  const rowEls=[];

  function buildRow(l){
    const ds=l.dateObj.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const ts=l.dateObj.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})+' (local)';
    const row=document.createElement('div'); row.className='launch-row'; row.title='Click for details';
    const wlHTML=l.watchUrl?`<a class="row-watch-link" id="row-watch-${l._idx}" href="${l.watchUrl}" target="_blank" onclick="event.stopPropagation()">Watch Live <span class="rw-arrow">&#8599;</span></a>`:'';
    row.innerHTML=`
      <div><strong>${l.rocket}</strong></div>
      <div style="color:#aaa;font-family:var(--mono);font-size:0.88em;">${ds}</div>
      <div style="color:#666;font-size:0.84em;font-family:var(--mono);">${ts}</div>
      <div style="display:flex;align-items:center;gap:14px;justify-content:flex-end;">${wlHTML}<div class="status-badge" style="color:${statusColor(l.status)};">${l.status}</div></div>`;
    row.addEventListener('click',()=>openLaunchModal(l._idx));
    if(l.watchUrl){setTimeout(()=>{const el=document.getElementById(`row-watch-${l._idx}`);if(el)window.registerRowWatch(l._idx,el);},0);}
    return row;
  }

  allItems.forEach((l,i)=>{
    const row=buildRow(l); row.style.display=i<visibleCount?'':'none';
    rw.appendChild(row); rowEls.push(row);
  });

  let loadMoreBtn=null;
  if(g.paginate&&allItems.length>accLoadMorePerPage){
    loadMoreBtn=document.createElement('button');
    loadMoreBtn.className='acc-load-more';
    loadMoreBtn.textContent=`Load more (${allItems.length-visibleCount} remaining)`;
    loadMoreBtn.addEventListener('click',e=>{
      e.stopPropagation();
      const prev=visibleCount;
      visibleCount=Math.min(visibleCount+accLoadMorePerPage,allItems.length);
      for(let i=prev;i<visibleCount;i++){rowEls[i].style.display='';}
      if(visibleCount>=allItems.length){loadMoreBtn.remove();loadMoreBtn=null;}
      else{loadMoreBtn.textContent=`Load more (${allItems.length-visibleCount} remaining)`;}
      rw.style.maxHeight=rw.scrollHeight+'px';
    });
    rw.appendChild(loadMoreBtn);
  }

  acc.appendChild(hdr); acc.appendChild(rw); schedCont.appendChild(acc);

  hdr.addEventListener('click',()=>{
    playSound('accordion');
    const isOpen=acc.classList.contains('open');
    if(isOpen){
      rw.style.maxHeight=rw.scrollHeight+'px';
      rw.classList.remove('open');
      requestAnimationFrame(()=>{rw.style.maxHeight='0px';});
      acc.classList.remove('open');
    } else {
      acc.classList.add('open');
      rw.style.maxHeight=rw.scrollHeight+'px';
      rw.classList.add('open');
      rw.addEventListener('transitionend',()=>{if(acc.classList.contains('open'))rw.style.maxHeight='none';},{once:true});
    }
  });
});
</script>

<script>
  document.documentElement.style.zoom = "1.09";
</script>
