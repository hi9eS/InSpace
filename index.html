<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InSpace</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #080808;
  --bg2: #0f0f0f;
  --bg3: #141414;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --text: #f0f0f0;
  --muted: #666;
  --muted2: #444;
  --font: 'DM Sans', 'Segoe UI', sans-serif;
  --mono: 'DM Mono', monospace;
  --ease: cubic-bezier(0.4,0,0.2,1);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);

  /* ── Accordion size scale (tweak here to resize launch group rows) ── */
  --acc-padding-v: 17px;
  --acc-padding-h: 22px;
  --acc-font-label: 0.79em;
  --acc-font-count: 0.79em;
  --acc-dot-size: 10px;
}
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:var(--font); line-height:1.6; font-size:15px; overflow-x:hidden; }
a { color:inherit; text-decoration:none; }

#starfield { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--dur,4s) var(--delay,0s) infinite ease-in-out alternate; opacity:0; }
@keyframes twinkle {
  0%   { opacity:0; transform:scale(0.8); }
  50%  { opacity:var(--op,0.5); }
  100% { opacity:0.08; transform:scale(1.1); }
}

header {
  position:sticky; top:0; z-index:100;
  display:flex; justify-content:center; gap:4px;
  padding:14px 0;
  background:rgba(8,8,8,0.88);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
header::after {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:180px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
}
header a {
  font-size:0.85em; font-weight:400; letter-spacing:0.04em;
  padding:7px 16px; border-radius:8px; cursor:pointer;
  color:var(--muted);
  transition:color 0.2s, background 0.2s, transform 0.15s var(--ease-spring);
}
header a:hover { color:var(--text); transform:translateY(-1px); background:rgba(255,255,255,0.05); }
header a:active { transform:scale(0.96); }

section { padding:90px 20px; max-width:1000px; margin:0 auto; position:relative; z-index:1; }

.hero { text-align:center; padding-top:130px; }
.hero h1 {
  font-size:clamp(2.5em,5.5vw,4em);
  font-weight:300; letter-spacing:-0.02em; margin-bottom:20px;
  animation:fadeUp 0.8s var(--ease) both;
}
.hero p {
  font-size:1.1em; max-width:600px; margin:0 auto 36px;
  color:var(--muted); font-weight:300;
  animation:fadeUp 0.8s 0.1s var(--ease) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── COUNTDOWN — with Days ── */
#countdown-wrap {
  display:none;
  margin:0 auto 44px; max-width:640px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:20px; padding:28px 40px;
  position:relative; overflow:hidden;
  animation:fadeUp 0.8s 0.15s var(--ease) both;
}
#countdown-wrap::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
}
#countdown-mission { font-size:0.72em; letter-spacing:0.18em; text-transform:uppercase; color:#888; margin-bottom:10px; font-family:var(--mono); }
#countdown-label { font-size:0.85em; color:#aaa; margin-bottom:18px; font-weight:300; }
#countdown-timer { display:flex; justify-content:center; align-items:center; gap:18px; }
.cd-unit { text-align:center; min-width:52px; }
.cd-num { font-size:2.6em; font-weight:300; font-variant-numeric:tabular-nums; letter-spacing:0.04em; line-height:1; font-family:var(--mono); }
.cd-lbl { font-size:0.63em; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted2); margin-top:5px; }
.cd-sep { font-size:2em; font-weight:200; color:var(--muted2); line-height:1; padding-bottom:14px; }
.cd-sep-thin { width:1px; height:36px; background:rgba(255,255,255,0.1); align-self:center; margin-bottom:14px; }

/* ── WATCH LAUNCH BUTTON — slightly larger ── */
.stream-link {
  display:inline-flex; align-items:center; gap:11px;
  font-size:1.06em; font-weight:400; letter-spacing:0.07em;
  padding:16px 46px;
  border:1px solid rgba(255,255,255,0.35); border-radius:100px;
  cursor:pointer; color:#fff;
  transition:all 0.3s var(--ease);
  margin-bottom:70px; position:relative; overflow:hidden;
  animation:fadeUp 0.8s 0.2s var(--ease) both;
}
.stream-link::before {
  content:''; position:absolute; inset:0;
  background:#fff; transform:scaleX(0); transform-origin:left;
  transition:transform 0.35s var(--ease); border-radius:100px;
}
.stream-link:hover { color:#000; border-color:#fff; transform:translateY(-2px); }
.stream-link:hover::before { transform:scaleX(1); }
.stream-link-text { position:relative; z-index:1; }

h2 { font-size:1.7em; font-weight:300; letter-spacing:-0.01em; margin-bottom:36px; }

/* ── VEHICLE CARDS ── */
.vehicle-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}
.vehicle-card {
  background: var(--bg2);
  border-radius: 20px;
  cursor: pointer;
  transition: transform 0.3s var(--ease-spring), box-shadow 0.3s var(--ease), border-color 0.3s var(--ease);
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
}
.vehicle-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 24px 64px rgba(0,0,0,0.55);
  border-color: rgba(255,255,255,0.14);
}
.vc-color-bar {
  height: 3px;
  background: var(--vc, #fff);
  opacity: 0.55;
  transition: opacity 0.3s, height 0.25s var(--ease);
  flex-shrink: 0;
}
.vehicle-card:hover .vc-color-bar { opacity: 0.85; height: 4px; }
.vc-inner {
  padding: 28px 26px 22px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.vc-label-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 5px;
}

/* ── Dot: softer, balanced ── */
.vc-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--vc, #fff);
  flex-shrink: 0;
  opacity: 0.55;
  box-shadow: 0 0 5px color-mix(in srgb, var(--vc, #fff) 40%, transparent);
  transition: box-shadow 0.3s, opacity 0.3s;
}
.vehicle-card:hover .vc-dot {
  opacity: 0.8;
  box-shadow: 0 0 10px color-mix(in srgb, var(--vc, #fff) 55%, transparent);
}

.vc-name {
  font-size: 1.35em;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.vc-sub {
  font-size: 0.71em;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 26px;
  font-family: var(--mono);
}
.vc-divider {
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin-bottom: 20px;
}
.vc-stat-row {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin-top: auto;
}
.vc-stat { text-align: center; flex: 1; }
.vc-stat-val {
  font-size: 1.1em;
  font-weight: 400;
  font-family: var(--mono);
  color: var(--text);
  letter-spacing: 0.02em;
}
.vc-stat-lbl {
  font-size: 0.62em;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
}
.vc-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 13px 26px;
  border-top: 1px solid rgba(255,255,255,0.05);
  margin-top: 20px;
  gap: 6px;
}
.vc-footer-text {
  font-size: 0.73em;
  color: var(--muted2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: var(--mono);
  transition: color 0.2s;
}
.vc-footer-arrow {
  font-size: 0.85em;
  color: var(--muted2);
  transition: transform 0.25s var(--ease-spring), color 0.2s;
}
.vehicle-card:hover .vc-footer-text,
.vehicle-card:hover .vc-footer-arrow { color: var(--vc, #fff); }
.vehicle-card:hover .vc-footer-arrow { transform: translate(3px, -3px); }

/* ── VEHICLE OVERLAY ── */
#vehicle-overlay {
  display:none; position:fixed; inset:0;
  background:var(--bg); z-index:200; overflow-y:auto;
  opacity:0; transition:opacity 0.35s var(--ease);
}
#vehicle-overlay.active { display:block; }
#vehicle-overlay.visible { opacity:1; }
.vp-header {
  position:sticky; top:0;
  background:rgba(8,8,8,0.92); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:20px;
  padding:18px 32px; z-index:10;
}
.vp-back {
  background:none; border:1px solid var(--border); color:var(--muted);
  padding:8px 20px; border-radius:100px; cursor:pointer;
  font-size:0.82em; font-family:var(--font);
  transition:all 0.2s var(--ease);
}
.vp-back:hover { background:var(--bg3); color:var(--text); border-color:var(--border-hover); transform:translateX(-2px); }
.vp-title { font-size:1em; font-weight:300; color:var(--muted); }
.vp-body { max-width:900px; margin:0 auto; padding:60px 24px 100px; animation:fadeUp 0.5s 0.05s var(--ease) both; }
.vp-hero-name { font-size:clamp(2.5em,6vw,4em); font-weight:300; letter-spacing:-0.01em; margin-bottom:8px; }
.vp-hero-class { font-size:0.72em; color:var(--muted); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:48px; font-family:var(--mono); }
.vp-img-wrap {
  width:100%; aspect-ratio:16/7;
  background:var(--bg2); border:1px solid var(--border); border-radius:18px;
  margin-bottom:60px; display:flex; align-items:center; justify-content:center;
  overflow:hidden; position:relative;
}
.vp-img-wrap img { width:100%; height:100%; object-fit:cover; }
.vp-img-placeholder { font-size:0.72em; color:var(--muted2); letter-spacing:0.15em; text-transform:uppercase; font-family:var(--mono); }
.vp-specs-title {
  font-size:0.68em; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--muted); margin-bottom:16px;
  border-bottom:1px solid var(--border); padding-bottom:12px; font-family:var(--mono);
}
.vp-specs-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px; margin-bottom:52px;
}
.vp-spec {
  background:var(--bg2); border:1px solid rgba(255,255,255,0.07);
  border-radius:14px; padding:20px 18px;
  transition:background 0.2s, border-color 0.2s;
}
.vp-spec:hover { background:var(--bg3); border-color:rgba(255,255,255,0.12); }
.vp-spec-val { font-size:1.4em; font-weight:300; margin-bottom:4px; line-height:1; font-family:var(--mono); }
.vp-spec-lbl { font-size:0.63em; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
.vp-stages { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:52px; }
@media(max-width:600px){ .vp-stages { grid-template-columns:1fr; } }
.vp-stage {
  background:var(--bg2); border:1px solid rgba(255,255,255,0.07);
  border-radius:14px; padding:24px 20px;
}
.vp-stage-title { font-size:0.68em; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:16px; font-family:var(--mono); }
.vp-stage-row { display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); font-size:0.9em; }
.vp-stage-row:last-child { border-bottom:none; }
.vp-stage-key { color:var(--muted); }
.vp-stage-val { font-weight:400; font-family:var(--mono); }
.vp-desc { color:#777; font-size:1.0em; line-height:1.85; max-width:680px; font-weight:300; }

/* ── LATEST NEWS — Reworked ── */
.rocket-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px;
  margin-top: 20px;
}
.rocket {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px;
  padding: 0;
  transition: transform 0.28s var(--ease-spring), box-shadow 0.28s var(--ease), border-color 0.25s;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  cursor: default;
  opacity: 0;
  transform: translateY(16px);
  animation: newsIn 0.5s var(--ease) forwards;
}
@keyframes newsIn {
  to { opacity:1; transform:translateY(0); }
}
.rocket:hover {
  transform: translateY(-5px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  border-color: rgba(255,255,255,0.13);
}
.rocket-top-bar {
  height: 2px;
  background: linear-gradient(90deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
  transition: background 0.3s;
}
.rocket:hover .rocket-top-bar {
  background: linear-gradient(90deg, rgba(255,255,255,0.28), rgba(255,255,255,0.06));
}
.rocket-body {
  padding: 22px 22px 14px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.rocket h3 {
  margin-bottom: 10px;
  font-size: 0.97em;
  font-weight: 500;
  letter-spacing: -0.005em;
  line-height: 1.4;
  color: var(--text);
}
.rocket p.rocket-desc {
  font-size: 0.875em;
  color: #888;
  line-height: 1.7;
  flex: 1;
}
.rocket-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 22px;
  border-top: 1px solid rgba(255,255,255,0.05);
  margin-top: 14px;
}
.rocket-date {
  font-size: 0.75em;
  color: #444;
  font-family: var(--mono);
  letter-spacing: 0.04em;
}
.rocket-details-btn {
  font-size: 0.72em;
  color: var(--muted2);
  font-family: var(--mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s;
  background: none;
  border: none;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 4px;
}
.rocket-details-btn .rd-arrow {
  transition: transform 0.22s var(--ease-spring);
  display: inline-block;
}
.rocket:hover .rocket-details-btn { color: #aaa; }
.rocket:hover .rocket-details-btn .rd-arrow { transform: translate(2px, -2px); }

/* News expand panel */
.rocket-expand {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.38s var(--ease), opacity 0.28s ease, padding 0.3s;
  padding: 0 22px;
  font-size: 0.85em;
  color: #666;
  line-height: 1.75;
  border-top: 0 solid transparent;
}
.rocket.expanded .rocket-expand {
  max-height: 200px;
  opacity: 1;
  padding: 14px 22px 18px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.rocket.expanded .rocket-details-btn .rd-arrow {
  transform: rotate(90deg) !important;
}

#load-more-btn {
  display:block; margin:24px auto 0; padding:10px 32px;
  background:transparent; border:1px solid var(--border);
  color:var(--muted); border-radius:100px;
  font-size:0.85em; font-family:var(--font); cursor:pointer;
  transition:all 0.2s var(--ease);
}
#load-more-btn:hover { background:var(--bg2); color:var(--text); border-color:var(--border-hover); }

/* ── LAUNCH SCHEDULE ── */
#launch-list { margin-top:10px; display:flex; flex-direction:column; gap:10px; }

.launch-row {
  display:grid; grid-template-columns:2fr 1.8fr 1fr 1fr;
  align-items:center; padding:15px 20px;
  background:rgba(255,255,255,0.025); border:1px solid var(--border);
  border-radius:13px; transition:all 0.2s ease;
}
.launch-row:hover { background:rgba(255,255,255,0.05); transform:scale(1.012); border-color:var(--border-hover); }
.launch-row strong { font-size:0.97em; color:#fff; }
.launch-row div { font-size:0.87em; }

.status-badge {
  text-align:center; font-size:0.74em; font-weight:600;
  text-transform:uppercase; padding:6px 14px; border-radius:100px;
  background:rgba(0,0,0,0.3); border:1px solid currentColor;
  justify-self:end; min-width:108px;
  font-family:var(--mono); letter-spacing:0.06em; opacity:0.85;
}

@media(max-width:768px){
  .launch-row { grid-template-columns:1.5fr 1fr; gap:8px; }
  .status-badge { grid-column:span 2; justify-self:start; }
}

/* ── ACCORDION ── */
.group-accordion { border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:box-shadow 0.3s, border-color 0.25s; }
.group-accordion:hover { box-shadow:0 4px 20px rgba(255,255,255,0.03); border-color:var(--border-hover); }
.group-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:var(--acc-padding-v) var(--acc-padding-h);
  background:rgba(255,255,255,0.025); cursor:pointer; user-select:none; transition:background 0.2s;
}
.group-header:hover { background:rgba(255,255,255,0.05); }
.group-left { display:flex; align-items:center; gap:14px; }
.group-dot {
  width:var(--acc-dot-size); height:var(--acc-dot-size);
  border-radius:50%; flex-shrink:0;
}
.group-label { font-size:var(--acc-font-label); font-weight:500; letter-spacing:0.14em; text-transform:uppercase; font-family:var(--mono); }
.group-count { font-size:var(--acc-font-count); color:var(--muted2); font-weight:400; font-family:var(--mono); }
.group-chevron { font-size:0.72em; color:var(--muted2); transition:transform 0.35s var(--ease); }
.group-accordion.open .group-chevron { transform:rotate(180deg); }
.group-rows { max-height:0; overflow:hidden; opacity:0; transition:max-height 0.4s var(--ease), opacity 0.3s ease; }

.contact p, .contact a { color:#aaa; margin-bottom:5px; }
.contact a:hover { color:var(--text); }
footer { text-align:center; padding:24px; border-top:1px solid var(--border); font-size:0.8em; color:var(--muted); font-family:var(--mono); position:relative; z-index:1; }

.reveal { opacity:0; transform:translateY(22px); transition:opacity 0.7s var(--ease), transform 0.7s var(--ease); }
.reveal.visible { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div id="starfield"></div>

<div id="vehicle-overlay">
  <div class="vp-header">
    <button class="vp-back" onclick="closeVehicle()">&#8592; Back</button>
    <span class="vp-title" id="vp-header-title"></span>
  </div>
  <div class="vp-body" id="vp-body"></div>
</div>

<header>
  <a onclick="closeVehicle();scrollToSection('hero')">Home</a>
  <a onclick="closeVehicle();scrollToSection('fleet')">Vehicles</a>
  <a onclick="closeVehicle();scrollToSection('rockets')">News</a>
  <a onclick="closeVehicle();scrollToSection('schedule')">Schedule</a>
  <a onclick="closeVehicle();scrollToSection('contact')">Contact</a>
</header>

<section class="hero" id="hero">
  <h1>Welcome to InSpace</h1>
  <p>Keep an eye out for updates</p>

  <!-- Countdown with Days -->
  <div id="countdown-wrap">
    <div id="countdown-mission"></div>
    <div id="countdown-label">Next launch in</div>
    <div id="countdown-timer">
      <div class="cd-unit"><div class="cd-num" id="cd-d">00</div><div class="cd-lbl">Days</div></div>
      <div class="cd-sep-thin"></div>
      <div class="cd-unit"><div class="cd-num" id="cd-h">00</div><div class="cd-lbl">Hours</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-m">00</div><div class="cd-lbl">Min</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-s">00</div><div class="cd-lbl">Sec</div></div>
    </div>
  </div>

  <div class="stream-link" onclick="window.open('https://www.youtube.com/@hi9eS')">
    <span class="stream-link-text">Watch Launch</span>
  </div>
</section>

<section id="fleet" class="reveal">
  <h2>Our Vehicles</h2>
  <div class="vehicle-cards" id="vehicle-cards"></div>
</section>

<section id="rockets" class="reveal">
  <h2>Latest News</h2>
  <div class="rocket-cards" id="rocket-cards"></div>
  <button id="load-more-btn" onclick="loadMore()" style="display:none;">Load more</button>
</section>

<section id="schedule" class="reveal">
  <h2>Launch Schedule</h2>
  <div id="launch-list"></div>
</section>

<section class="contact reveal" id="contact">
  <h2>Contact</h2>

    sf.appendChild(s);

const revealObs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
},{threshold:0.07});
document.querySelectorAll('.reveal').forEach(el=>revealObs.observe(el));

function scrollToSection(id){ document.getElementById(id).scrollIntoView({behavior:'smooth'}); }

function statusColor(status){
  switch(status){
    case 'Planned': return '#fff';
    case 'Delayed': return '#ffcc00';
    case 'Completed': return '#00cc66';
    case 'Concept/Plan': return '#00ccff';
    case 'Canceled': return '#ff3300';
    case 'Coming Soon': return '#d9d9d9';
    case 'Recorded': return '#00cc66';
    default: return '#ccc';
  }
}

const vcContainer = document.getElementById('vehicle-cards');
vehicles.forEach(v => {

  card.style.setProperty('--vc', v.color);
  card.innerHTML = `
    <div class="vc-color-bar"></div>

      <div class="vc-label-row">
        <div class="vc-dot"></div>
        <div class="vc-name">${v.name}</div>
      </div>
      <div class="vc-sub">${v.class}</div>
      <div class="vc-divider"></div>
      <div class="vc-stat-row">
        ${v.cardStats.map(s=>`<div class="vc-stat"><div class="vc-stat-val">${s.val}</div><div class="vc-stat-lbl">${s.lbl}</div></div>`).join('')}

function openVehicle(id) {
  const v = vehicles.find(x => x.id === id);
  if (!v) return;
  document.getElementById('vp-header-title').textContent = v.name;
  const imgHTML = v.image ? `<img src="${v.image}" alt="${v.name}">` : `<div class="vp-img-placeholder">No data. Image coming soon</div>`;
  const specsHTML = v.specs.map(s => `<div class="vp-spec"><div class="vp-spec-val">${s.val}</div><div class="vp-spec-lbl">${s.lbl}</div></div>`).join('');
  const stagesHTML = v.stages.map(st => `<div class="vp-stage"><div class="vp-stage-title">${st.title}</div>${st.rows.map(r=>`<div class="vp-stage-row"><span class="vp-stage-key">${r.key}</span><span class="vp-stage-val">${r.val}</span></div>`).join('')}</div>`).join('');
  document.getElementById('vp-body').innerHTML = `
    <div class="vp-hero-name" style="color:${v.color}">${v.name}</div>
    <div class="vp-hero-class">${v.class}</div>
    <div class="vp-img-wrap">${imgHTML}</div>
    <div class="vp-specs-title">Specifications</div>
    <div class="vp-specs-grid">${specsHTML}</div>
    <div class="vp-specs-title">Stages</div>
    <div class="vp-stages">${stagesHTML}</div>
    <div class="vp-specs-title">Overview</div>
    <div class="vp-desc">${v.description}</div>`;
  const overlay = document.getElementById('vehicle-overlay');
  overlay.classList.add('active');
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>overlay.classList.add('visible')); });
  overlay.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeVehicle() {
  const overlay = document.getElementById('vehicle-overlay');
  overlay.classList.remove('visible');
  setTimeout(()=>{ overlay.classList.remove('active'); document.body.style.overflow = ''; }, 350);
}

/* ── NEWS — with expand detail panel ── */
const allRockets = [
  { name:'SunPower One', description:'Where it all began. The name "SunPower" was coined on the fly by Haisess.', detail:'The very first SunPower prototype was assembled and launched within a single session, marking the birth of the InSpace vehicle programme. It flew a nominal trajectory before controlled descent.', date:'February 26, 2026' },
  { name:'SunOrbit One', description:'Orbiting platform built in stages. Features docking capabilities, solar panels, and communication systems.', detail:'SunOrbit One demonstrated multi-stage separation and achieved stable low Earth orbit. Docking rings and high-gain antenna arrays were deployed successfully during the mission.', date:'February 26, 2026' },
  { name:'Trial Mission to the Moon', description:'The team is preparing for a trial run of the upcoming lunar mission.', detail:'Initial trajectory calculations and propellant budgets have been finalised. The trial will validate trans-lunar injection burn performance before a crewed attempt.', date:'February 27, 2026' },
  { name:'Beyond Earth Orbit', description:'<i>"We\'re ready to move beyond Earth\'s pull, coming very soon."</i>', detail:'Internal mission planning documents confirm targets beyond cis-lunar space. An interplanetary transfer window analysis is currently underway for a possible Mars flyby.', date:'February 27, 2026' },
  { name:'Cancelling Missions', description:'Resumption is coming soon. We are currently preparing for two targets: Mars and the Moon.', detail:'Several scheduled test flights were cancelled to consolidate resources around the dual Mars and Moon programme. A revised launch manifest is expected shortly.', date:'March 03, 2026' },
  { name:'Vertical Recovery: The Mark of Precision', description:'<i>"Where others leave a crater, we leave our mark."</i>', detail:'Booster SN8 executed a textbook suicide burn and touched down within 0.4 m of the target pad centre. Recovery teams confirmed zero structural damage.', date:'March 6, 2026' },
];

const NEWS_PER_PAGE = 3;
let newsShown = 0;

function renderNews() {
  const grid = document.getElementById('rocket-cards');
  const btn = document.getElementById('load-more-btn');
  const slice = allRockets.slice(newsShown, newsShown + NEWS_PER_PAGE);
  slice.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'rocket';
    card.style.animationDelay = (i * 0.08) + 's';
    card.innerHTML = `
      <div class="rocket-top-bar"></div>
      <div class="rocket-body">
        <h3>${r.name}</h3>
        <p class="rocket-desc">${r.description}</p>
      </div>
      <div class="rocket-expand">${r.detail}</div>
      <div class="rocket-footer">
        <span class="rocket-date">${r.date}</span>
        <button class="rocket-details-btn" onclick="toggleNews(this)">
          Details <span class="rd-arrow">&#8599;</span>
        </button>
      </div>`;
    grid.appendChild(card);
  });
  newsShown += slice.length;
  btn.style.display = newsShown < allRockets.length ? 'block' : 'none';
}

function toggleNews(btn) {
  const card = btn.closest('.rocket');
  const expand = card.querySelector('.rocket-expand');
  const isOpen = card.classList.contains('expanded');
  if (isOpen) {
    expand.style.maxHeight = expand.scrollHeight + 'px';
    requestAnimationFrame(() => {
      expand.style.maxHeight = '0';
      expand.style.opacity = '0';
    });
    card.classList.remove('expanded');
  } else {
    card.classList.add('expanded');
    expand.style.maxHeight = expand.scrollHeight + 'px';
    expand.style.opacity = '1';
    expand.addEventListener('transitionend', () => {
      if (card.classList.contains('expanded')) expand.style.maxHeight = 'none';
    }, { once: true });
  }
}

function loadMore() { renderNews(); }
renderNews();

launches.forEach(l => {
  const [d, t] = l.date.split(' ');
  const [year, month, day] = d.split('-').map(Number);
  const [hour, minute] = t.split(':').map(Number);
  l.dateObj = new Date(Date.UTC(year, month - 1, day, hour - 5, minute));
});

/* ── COUNTDOWN with Days ── */
(function initCountdown(){
  const now = new Date();
  const nextLaunch = launches
    .filter(l => l.status === 'Planned' && l.dateObj > now)
    .sort((a, b) => a.dateObj - b.dateObj)[0];
  if (!nextLaunch) return;
  document.getElementById('countdown-wrap').style.display = 'block';
  document.getElementById('countdown-mission').textContent = nextLaunch.rocket;

  function tick() {
    const ms = nextLaunch.dateObj - Date.now();
    if (ms <= 0) {
      ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00');
      return;
    }
    const totalSec = Math.floor(ms / 1000);
    const d = Math.floor(totalSec / 86400);
    const h = Math.floor((totalSec % 86400) / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    document.getElementById('cd-d').textContent = String(d).padStart(2,'0');
    document.getElementById('cd-h').textContent = String(h).padStart(2,'0');
    document.getElementById('cd-m').textContent = String(m).padStart(2,'0');
    document.getElementById('cd-s').textContent = String(s).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);
})();

/* ── ACCORDION ── */
const groups = [
  { status:'Planned',   color:'#ffffff' },
  { status:'Completed', color:'#00cc66' },
  { status:'Canceled',  color:'#ff3300' },
];
const scheduleContainer = document.getElementById('launch-list');

groups.forEach(g => {
  const items = launches.filter(l => l.status === g.status);
  if (!items.length) return;
  const acc = document.createElement('div');
  acc.className = 'group-accordion';
  const header = document.createElement('div');
  header.className = 'group-header';
  header.innerHTML = `
    <div class="group-left">
      <div class="group-dot" style="background:${g.color};box-shadow:0 0 6px ${g.color}55;"></div>
      <span class="group-label" style="color:${g.color}">${g.status}</span>
      <span class="group-count">${items.length} launch${items.length!==1?'es':''}</span>
    </div>
    <span class="group-chevron">&#9660;</span>`;
  const rowsWrap = document.createElement('div');
  rowsWrap.className = 'group-rows';
  items.forEach(l => {
    const dateStr = l.dateObj.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const timeStr = l.dateObj.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}) + ' (local)';
    const row = document.createElement('div');
    row.className = 'launch-row';
    row.innerHTML = `
      <div><strong>${l.rocket}</strong></div>
      <div style="color:#aaa;font-family:var(--mono);font-size:0.88em;">${dateStr}</div>
      <div style="color:#666;font-size:0.84em;font-family:var(--mono);">${timeStr}</div>
      <div class="status-badge" style="color:${statusColor(l.status)};">${l.status}</div>`;
    rowsWrap.appendChild(row);
  });
  acc.appendChild(header);
  acc.appendChild(rowsWrap);
  scheduleContainer.appendChild(acc);
  header.addEventListener('click', () => {
    const isOpen = acc.classList.contains('open');
    if (isOpen) {
      rowsWrap.style.maxHeight = rowsWrap.scrollHeight+'px';
      requestAnimationFrame(()=>{ rowsWrap.style.maxHeight='0'; rowsWrap.style.opacity='0'; });
      acc.classList.remove('open');
    } else {
      acc.classList.add('open');
      rowsWrap.style.maxHeight = rowsWrap.scrollHeight+'px';
      rowsWrap.style.opacity = '1';
      rowsWrap.addEventListener('transitionend',()=>{ if(acc.classList.contains('open')) rowsWrap.style.maxHeight='none'; },{once:true});
    }
  });
});
</script>
