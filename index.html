<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InSpace</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #080808;
  --bg2: #0f0f0f;
  --bg3: #141414;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --text: #f0f0f0;
  --muted: #666;
  --muted2: #444;
  --font: 'DM Sans', 'Segoe UI', sans-serif;
  --mono: 'DM Mono', monospace;
  --ease: cubic-bezier(0.4,0,0.2,1);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);

  --hero-title-from: #ffffff;
  --hero-title-to: #a0c8ff;
  --hero-title-glow: rgba(120,180,255,0.18);

  --hero-sub-brightness: 1.38;
  --hero-sub-color: #888;

  --acc-padding-v: 17px;
  --acc-padding-h: 22px;
  --acc-font-label: 0.79em;
  --acc-font-count: 0.79em;
  --acc-dot-size: 10px;
}
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:var(--font); line-height:1.6; font-size:15px; overflow-x:hidden; }
a { color:inherit; text-decoration:none; }

/* ── STARFIELD (main + overlay reuse) ── */
#starfield,
#vp-starfield {
  position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
}
#vp-starfield { z-index:0; }
.star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--dur,4s) var(--delay,0s) infinite ease-in-out alternate; opacity:0; }
@keyframes twinkle {
  0%   { opacity:0; transform:scale(0.8); }
  50%  { opacity:var(--op,0.5); }
  100% { opacity:0.08; transform:scale(1.1); }
}

header {
  position:sticky; top:0; z-index:100;
  display:flex; justify-content:center; gap:4px;
  padding:14px 0;
  background:rgba(8,8,8,0.88);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
header::after {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:180px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
}
header a {
  font-size:0.85em; font-weight:400; letter-spacing:0.04em;
  padding:7px 16px; border-radius:8px; cursor:pointer;
  color:var(--muted);
  transition:color 0.2s, background 0.2s, transform 0.15s var(--ease-spring);
}
header a:hover { color:var(--text); transform:translateY(-1px); background:rgba(255,255,255,0.05); }
header a:active { transform:scale(0.96); }

section { padding:90px 20px; max-width:1000px; margin:0 auto; position:relative; z-index:1; }

.hero { text-align:center; padding-top:130px; }
.hero h1 {
  font-size:clamp(2.5em,5.5vw,4em);
  font-weight:300; letter-spacing:-0.02em; margin-bottom:20px;
  animation:fadeUp 0.8s var(--ease) both;
  background: linear-gradient(135deg, var(--hero-title-from) 0%, var(--hero-title-to) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 26px var(--hero-title-glow)) drop-shadow(0 0 8px var(--hero-title-glow));
}
.hero p {
  font-size:1.1em; max-width:600px; margin:0 auto 36px;
  color:var(--hero-sub-color); font-weight:300;
  filter: brightness(var(--hero-sub-brightness));
  animation:fadeUp 0.8s 0.1s var(--ease) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── COUNTDOWN ── */
#countdown-wrap {
  display:none; margin:0 auto 44px; max-width:640px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:20px; padding:28px 40px;
  position:relative; overflow:hidden;
  animation:fadeUp 0.8s 0.15s var(--ease) both;
}
#countdown-wrap::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
}
#countdown-mission { font-size:0.72em; letter-spacing:0.18em; text-transform:uppercase; color:#888; margin-bottom:10px; font-family:var(--mono); }
#countdown-label { font-size:0.85em; color:#aaa; margin-bottom:18px; font-weight:300; }
#countdown-timer { display:flex; justify-content:center; align-items:center; gap:18px; }
.cd-unit { text-align:center; min-width:52px; }
.cd-num { font-size:2.6em; font-weight:300; font-variant-numeric:tabular-nums; letter-spacing:0.04em; line-height:1; font-family:var(--mono); }
.cd-lbl { font-size:0.63em; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted2); margin-top:5px; }
.cd-sep { font-size:2em; font-weight:200; color:var(--muted2); line-height:1; padding-bottom:14px; }
.cd-sep-thin { width:1px; height:36px; background:rgba(255,255,255,0.1); align-self:center; margin-bottom:14px; }

.stream-link {
  display:inline-flex; align-items:center; gap:11px;
  font-size:1.06em; font-weight:400; letter-spacing:0.07em;
  padding:16px 46px;
  border:1px solid rgba(255,255,255,0.35); border-radius:100px;
  cursor:pointer; color:#fff;
  transition:all 0.3s var(--ease);
  margin-bottom:70px; position:relative; overflow:hidden;
  animation:fadeUp 0.8s 0.2s var(--ease) both;
}
.stream-link::before {
  content:''; position:absolute; inset:0;
  background:#fff; transform:scaleX(0); transform-origin:left;
  transition:transform 0.35s var(--ease); border-radius:100px;
}
.stream-link:hover { color:#000; border-color:#fff; transform:translateY(-2px); }
.stream-link:hover::before { transform:scaleX(1); }
.stream-link-text { position:relative; z-index:1; }

h2 { font-size:1.7em; font-weight:300; letter-spacing:-0.01em; margin-bottom:36px; }

/* ── VEHICLE CARDS ── */
.vehicle-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
.vehicle-card {
  background:var(--bg2); border-radius:20px; cursor:pointer;
  transition:transform 0.3s var(--ease-spring), box-shadow 0.3s var(--ease), border-color 0.3s var(--ease);
  position:relative; overflow:hidden;
  border:1px solid rgba(255,255,255,0.07); display:flex; flex-direction:column;
}
.vehicle-card:hover { transform:translateY(-6px); box-shadow:0 24px 64px rgba(0,0,0,0.55); border-color:rgba(255,255,255,0.14); }
.vc-color-bar { height:3px; background:var(--vc,#fff); opacity:0.55; transition:opacity 0.3s, height 0.25s var(--ease); flex-shrink:0; }
.vehicle-card:hover .vc-color-bar { opacity:0.85; height:4px; }
.vc-inner { padding:28px 26px 22px; display:flex; flex-direction:column; flex:1; }
.vc-label-row { display:flex; align-items:center; gap:10px; margin-bottom:5px; }
.vc-dot { width:8px; height:8px; border-radius:50%; background:var(--vc,#fff); flex-shrink:0; opacity:0.55; box-shadow:0 0 5px color-mix(in srgb, var(--vc,#fff) 40%, transparent); transition:box-shadow 0.3s, opacity 0.3s; }
.vehicle-card:hover .vc-dot { opacity:0.8; box-shadow:0 0 10px color-mix(in srgb, var(--vc,#fff) 55%, transparent); }
.vc-name { font-size:1.35em; font-weight:500; letter-spacing:-0.01em; line-height:1.2; }
.vc-sub { font-size:0.71em; color:var(--muted); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:26px; font-family:var(--mono); }
.vc-divider { height:1px; background:rgba(255,255,255,0.06); margin-bottom:20px; }
.vc-stat-row { display:flex; justify-content:space-between; gap:8px; margin-top:auto; }
.vc-stat { text-align:center; flex:1; }
.vc-stat-val { font-size:1.1em; font-weight:400; font-family:var(--mono); color:var(--text); letter-spacing:0.02em; }
.vc-stat-lbl { font-size:0.62em; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-top:4px; }
.vc-footer { display:flex; align-items:center; justify-content:flex-end; padding:13px 26px; border-top:1px solid rgba(255,255,255,0.05); margin-top:20px; gap:6px; }
.vc-footer-text { font-size:0.73em; color:var(--muted2); letter-spacing:0.1em; text-transform:uppercase; font-family:var(--mono); transition:color 0.2s; }
.vc-footer-arrow { font-size:0.85em; color:var(--muted2); transition:transform 0.25s var(--ease-spring), color 0.2s; }
.vehicle-card:hover .vc-footer-text, .vehicle-card:hover .vc-footer-arrow { color:var(--vc,#fff); }
.vehicle-card:hover .vc-footer-arrow { transform:translate(3px,-3px); }

/* ── VEHICLE OVERLAY ── */
#vehicle-overlay {
  display:none; position:fixed; inset:0;
  background:var(--bg); z-index:200; overflow-y:auto;
  opacity:0; transition:opacity 0.35s var(--ease);
}
#vehicle-overlay.active { display:block; }
#vehicle-overlay.visible { opacity:1; }

.vp-header {
  position:sticky; top:0;
  background:rgba(8,8,8,0.92); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:20px;
  padding:18px 32px; z-index:10;
}
.vp-back {
  background:none; border:1px solid var(--border); color:var(--muted);
  padding:8px 20px; border-radius:100px; cursor:pointer;
  font-size:0.82em; font-family:var(--font); transition:all 0.2s var(--ease);
}
.vp-back:hover { background:var(--bg3); color:var(--text); border-color:var(--border-hover); transform:translateX(-2px); }
.vp-title { font-size:1em; font-weight:300; color:var(--muted); }

.vp-body {
  max-width:900px; margin:0 auto; padding:60px 24px 100px;
  animation:fadeUp 0.5s 0.05s var(--ease) both;
  position:relative; z-index:1;
}

/* Vehicle page hero */
.vp-hero-name { font-size:clamp(2.5em,6vw,4em); font-weight:300; letter-spacing:-0.01em; margin-bottom:8px; }
.vp-hero-class { font-size:0.72em; color:var(--muted); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:48px; font-family:var(--mono); }

.vp-img-wrap {
  width:100%; aspect-ratio:16/7;
  background:var(--bg2); border:1px solid var(--border); border-radius:18px;
  margin-bottom:52px; display:flex; align-items:center; justify-content:center;
  overflow:hidden; position:relative;
}
.vp-img-wrap img { width:100%; height:100%; object-fit:cover; }
.vp-img-placeholder { font-size:0.72em; color:var(--muted2); letter-spacing:0.15em; text-transform:uppercase; font-family:var(--mono); }

/* Section title — same style as launch modal label */
.vp-section-title {
  font-size:0.68em; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--muted); margin-bottom:14px;
  border-bottom:1px solid var(--border); padding-bottom:12px; font-family:var(--mono);
}

/* ── Specs grid — styled like lm-grid ── */
.vp-specs-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:1px; background:rgba(255,255,255,0.07);
  border-radius:16px; overflow:hidden; margin-bottom:36px;
}
.vp-spec {
  background:var(--bg3); padding:18px 20px;
  transition:background 0.2s;
}
.vp-spec:hover { background:#1a1a1a; }
.vp-spec-lbl { font-size:0.62em; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; font-family:var(--mono); margin-bottom:6px; }
.vp-spec-val { font-size:1.25em; font-weight:300; font-family:var(--mono); color:var(--text); line-height:1.1; }

/* ── Stages — styled like lm-grid ── */
.vp-stages {
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:36px;
}
@media(max-width:600px){ .vp-stages { grid-template-columns:1fr; } }

.vp-stage {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px; padding:0; overflow:hidden;
}
.vp-stage-title {
  font-size:0.65em; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--muted); padding:14px 18px 12px; font-family:var(--mono);
  border-bottom:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.02);
}
.vp-stage-rows { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(255,255,255,0.06); }
.vp-stage-cell { background:var(--bg3); padding:13px 16px; transition:background 0.2s; }
.vp-stage-cell:hover { background:#1a1a1a; }
.vp-stage-key { font-size:0.6em; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; font-family:var(--mono); margin-bottom:4px; }
.vp-stage-val { font-size:0.95em; font-weight:300; font-family:var(--mono); color:var(--text); }

/* Overview */
.vp-desc { color:#777; font-size:1.0em; line-height:1.85; max-width:680px; font-weight:300; }

/* ── NEWS CARDS ── */
.rocket-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; margin-top:20px; }
.rocket {
  background:var(--bg2); border:1px solid rgba(255,255,255,0.07);
  border-radius:18px; padding:0;
  transition:transform 0.28s var(--ease-spring), box-shadow 0.28s var(--ease), border-color 0.25s;
  position:relative; overflow:hidden; display:flex; flex-direction:column;
  cursor:default; opacity:0; transform:translateY(16px);
  animation:newsIn 0.5s var(--ease) forwards;
}
@keyframes newsIn { to { opacity:1; transform:translateY(0); } }
.rocket:hover { transform:translateY(-5px); box-shadow:0 16px 48px rgba(0,0,0,0.4); border-color:rgba(255,255,255,0.13); }
.rocket-top-bar { height:2px; background:linear-gradient(90deg,rgba(255,255,255,0.12),rgba(255,255,255,0.04)); transition:background 0.3s; }
.rocket:hover .rocket-top-bar { background:linear-gradient(90deg,rgba(255,255,255,0.28),rgba(255,255,255,0.06)); }
.rocket-body { padding:22px 22px 14px; flex:1; display:flex; flex-direction:column; }
.rocket h3 { margin-bottom:10px; font-size:0.97em; font-weight:500; letter-spacing:-0.005em; line-height:1.4; color:var(--text); }
.rocket p.rocket-desc { font-size:0.875em; color:#888; line-height:1.7; flex:1; }
.rocket-footer { display:flex; align-items:center; justify-content:space-between; padding:12px 22px; border-top:1px solid rgba(255,255,255,0.05); margin-top:14px; }
.rocket-date { font-size:0.75em; color:#444; font-family:var(--mono); letter-spacing:0.04em; }
.rocket-details-btn {
  font-size:0.72em; color:var(--muted2); font-family:var(--mono);
  letter-spacing:0.1em; text-transform:uppercase; cursor:pointer;
  transition:color 0.2s; background:none; border:none; padding:0;
  display:flex; align-items:center; gap:5px;
}
.rocket-details-btn .rd-arrow { transition:transform 0.22s var(--ease-spring); display:inline-block; }
.rocket:hover .rocket-details-btn { color:#aaa; }
.rocket:hover .rocket-details-btn .rd-arrow { transform:translate(2px,-2px); }

#load-more-btn {
  display:block; margin:24px auto 0; padding:10px 32px;
  background:transparent; border:1px solid var(--border);
  color:var(--muted); border-radius:100px;
  font-size:0.85em; font-family:var(--font); cursor:pointer;
  transition:all 0.2s var(--ease);
}
#load-more-btn:hover { background:var(--bg2); color:var(--text); border-color:var(--border-hover); }

/* ── NEWS ARTICLE OVERLAY ── */
#news-overlay {
  display:none; position:fixed; inset:0;
  background:var(--bg); z-index:200; overflow-y:auto;
  opacity:0; transition:opacity 0.35s var(--ease);
}
#news-overlay.active { display:block; }
#news-overlay.visible { opacity:1; }
.np-header {
  position:sticky; top:0;
  background:rgba(8,8,8,0.92); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:20px;
  padding:18px 32px; z-index:10;
}
.np-back {
  background:none; border:1px solid var(--border); color:var(--muted);
  padding:8px 20px; border-radius:100px; cursor:pointer;
  font-size:0.82em; font-family:var(--font); transition:all 0.2s var(--ease);
}
.np-back:hover { background:var(--bg3); color:var(--text); border-color:var(--border-hover); transform:translateX(-2px); }
.np-header-title { font-size:1em; font-weight:300; color:var(--muted); }
.np-body { max-width:760px; margin:0 auto; padding:60px 24px 100px; animation:fadeUp 0.5s 0.05s var(--ease) both; }
.np-date-tag { font-size:0.7em; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); font-family:var(--mono); margin-bottom:18px; }
.np-title { font-size:clamp(1.8em,4vw,2.8em); font-weight:300; letter-spacing:-0.01em; margin-bottom:32px; line-height:1.25; }
.np-divider { height:1px; background:var(--border); margin-bottom:36px; }
.np-text { color:#888; font-size:1.0em; line-height:1.9; font-weight:300; }

/* ── LAUNCH SCHEDULE ── */
#launch-list { margin-top:10px; display:flex; flex-direction:column; gap:10px; }
.launch-row {
  display:grid; grid-template-columns:2fr 1.8fr 1fr 1fr;
  align-items:center; padding:15px 20px;
  background:rgba(255,255,255,0.025); border:1px solid var(--border);
  border-radius:10px; transition:background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
  cursor:pointer;
}
.launch-row:hover { background:rgba(255,255,255,0.05); transform:scale(1.012); border-color:var(--border-hover); }
.launch-row strong { font-size:0.97em; color:#fff; }
.launch-row div { font-size:0.87em; }
.status-badge {
  text-align:center; font-size:0.74em; font-weight:600;
  text-transform:uppercase; padding:6px 14px; border-radius:100px;
  background:rgba(0,0,0,0.3); border:1px solid currentColor;
  justify-self:end; min-width:108px;
  font-family:var(--mono); letter-spacing:0.06em; opacity:0.85;
}
@media(max-width:768px){
  .launch-row { grid-template-columns:1.5fr 1fr; gap:8px; }
  .status-badge { grid-column:span 2; justify-self:start; }
}

/* ── LAUNCH DETAIL MODAL ── */
#launch-modal-backdrop {
  display:none; position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,0.7); backdrop-filter:blur(6px);
  opacity:0; transition:opacity 0.3s var(--ease);
  align-items:center; justify-content:center;
}
#launch-modal-backdrop.active { display:flex; }
#launch-modal-backdrop.visible { opacity:1; }
#launch-modal {
  background:var(--bg2); border:1px solid rgba(255,255,255,0.12);
  border-radius:22px; width:min(540px,90vw); padding:0; overflow:hidden;
  transform:translateY(20px) scale(0.97);
  transition:transform 0.35s var(--ease-spring), opacity 0.3s;
  opacity:0; position:relative;
}
#launch-modal-backdrop.visible #launch-modal { transform:translateY(0) scale(1); opacity:1; }
.lm-color-bar { height:3px; opacity:0.7; }
.lm-inner { padding:30px 32px 28px; }
.lm-status-row { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
.lm-dot { width:8px; height:8px; border-radius:50%; opacity:0.75; }
.lm-status-text { font-size:0.7em; letter-spacing:0.18em; text-transform:uppercase; font-family:var(--mono); opacity:0.85; }
.lm-name { font-size:1.5em; font-weight:400; letter-spacing:-0.01em; margin-bottom:6px; line-height:1.25; }
.lm-type { font-size:0.72em; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; font-family:var(--mono); margin-bottom:28px; }
.lm-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:1px;
  background:rgba(255,255,255,0.07); border-radius:14px; overflow:hidden; margin-bottom:24px;
}
.lm-cell { background:var(--bg3); padding:16px 18px; }
.lm-cell-lbl { font-size:0.63em; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; font-family:var(--mono); margin-bottom:5px; }
.lm-cell-val { font-size:1.05em; font-family:var(--mono); color:var(--text); font-weight:300; }
.lm-desc { font-size:0.88em; color:#666; line-height:1.75; }
.lm-close {
  position:absolute; top:16px; right:20px;
  background:none; border:1px solid rgba(255,255,255,0.1); color:var(--muted2);
  width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:0.8em;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s var(--ease);
}
.lm-close:hover { background:rgba(255,255,255,0.07); color:var(--text); border-color:rgba(255,255,255,0.25); }

/* ── ACCORDION ── */
.group-accordion {
  border:1px solid var(--border); border-radius:14px; overflow:hidden;
  transition:box-shadow 0.3s, border-color 0.25s;
}
.group-accordion:hover { box-shadow:0 4px 20px rgba(255,255,255,0.03); border-color:var(--border-hover); }
.group-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:var(--acc-padding-v) var(--acc-padding-h);
  background:rgba(255,255,255,0.025); cursor:pointer; user-select:none; transition:background 0.2s;
}

    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--op:${Math.random()*0.45+0.1};--dur:${Math.random()*5+3}s;--delay:${Math.random()*6}s;`;

  }

  const [year, month, day] = d.split('-').map(Number);
  const [hour, minute] = t.split(':').map(Number);
  l.dateObj = new Date(Date.UTC(year, month - 1, day, hour - 5, minute));
});

/* ── COUNTDOWN ── */
(function initCountdown() {
  const now = new Date();
  const nextLaunch = launches
    .filter(l => l.status === 'Planned' && l.dateObj > now)
    .sort((a, b) => a.dateObj - b.dateObj)[0];
  if (!nextLaunch) return;
  document.getElementById('countdown-wrap').style.display = 'block';
  document.getElementById('countdown-mission').textContent = nextLaunch.rocket;
  function tick() {
    const ms = nextLaunch.dateObj - Date.now();
    if (ms <= 0) { ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00'); return; }
    const totalSec = Math.floor(ms / 1000);
    document.getElementById('cd-d').textContent = String(Math.floor(totalSec / 86400)).padStart(2, '0');
    document.getElementById('cd-h').textContent = String(Math.floor((totalSec % 86400) / 3600)).padStart(2, '0');
    document.getElementById('cd-m').textContent = String(Math.floor((totalSec % 3600) / 60)).padStart(2, '0');
    document.getElementById('cd-s').textContent = String(totalSec % 60).padStart(2, '0');
  }
  tick(); setInterval(tick, 1000);
})();

/* ── LAUNCH MODAL ── */
function openLaunchModal(idx) {
  const l = launches[idx];
  const color = statusColor(l.status);
  const backdrop = document.getElementById('launch-modal-backdrop');
  document.getElementById('lm-color-bar').style.background = color;
  document.getElementById('lm-dot').style.cssText = `width:8px;height:8px;border-radius:50%;background:${color};opacity:0.75;box-shadow:0 0 8px ${color}`;
  document.getElementById('lm-status-text').style.color = color;
  document.getElementById('lm-status-text').textContent = l.status;
  document.getElementById('lm-name').textContent = l.rocket;
  document.getElementById('lm-type').textContent = l.type;
  const dateStr = l.dateObj.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
  const timeStr = l.dateObj.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:false }) + ' local';
  document.getElementById('lm-grid').innerHTML = `
    <div class="lm-cell"><div class="lm-cell-lbl">Vehicle</div><div class="lm-cell-val">${l.vehicle}</div></div>
    <div class="lm-cell"><div class="lm-cell-lbl">Launch Site</div><div class="lm-cell-val">${l.site}</div></div>
    <div class="lm-cell"><div class="lm-cell-lbl">Date</div><div class="lm-cell-val">${dateStr}</div></div>
    <div class="lm-cell"><div class="lm-cell-lbl">Time</div><div class="lm-cell-val">${timeStr}</div></div>
    <div class="lm-cell"><div class="lm-cell-lbl">Target</div><div class="lm-cell-val">${l.target}</div></div>
    <div class="lm-cell"><div class="lm-cell-lbl">Duration</div><div class="lm-cell-val">${l.duration}</div></div>`;
  document.getElementById('lm-desc').textContent = l.desc;
  backdrop.classList.add('active');
  requestAnimationFrame(() => { requestAnimationFrame(() => backdrop.classList.add('visible')); });
  document.body.style.overflow = 'hidden';
}

function closeLaunchModal(e, force) {
  if (!force && e && e.target !== document.getElementById('launch-modal-backdrop')) return;
  const backdrop = document.getElementById('launch-modal-backdrop');
  backdrop.classList.remove('visible');
  setTimeout(() => { backdrop.classList.remove('active'); document.body.style.overflow = ''; }, 320);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLaunchModal(null, true); closeNews(); closeVehicle(); }
});

/* ── ACCORDION ── */
const groups = [
  { status:'Planned',   color:'#ffffff' },
  { status:'Completed', color:'#00cc66' },
  { status:'Canceled',  color:'#ff3300' },
];
const scheduleContainer = document.getElementById('launch-list');

groups.forEach(g => {
  const items = launches.map((l, i) => ({ ...l, _idx: i })).filter(l => l.status === g.status);
  if (!items.length) return;

  const acc = document.createElement('div');
  acc.className = 'group-accordion';

  const header = document.createElement('div');
  header.className = 'group-header';
  header.innerHTML = `
    <div class="group-left">
      <div class="group-dot" style="background:${g.color};box-shadow:0 0 6px ${g.color}55;"></div>
      <span class="group-label" style="color:${g.color}">${g.status}</span>
      <span class="group-count">${items.length} launch${items.length !== 1 ? 'es' : ''}</span>
    </div>
    <span class="group-chevron">&#9660;</span>`;

  const rowsWrap = document.createElement('div');
  rowsWrap.className = 'group-rows';

  items.forEach(l => {
    const dateStr = l.dateObj.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
    const timeStr = l.dateObj.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:false }) + ' (local)';
    const row = document.createElement('div');
    row.className = 'launch-row';
    row.title = 'Click for details';
    row.innerHTML = `
      <div><strong>${l.rocket}</strong></div>
      <div style="color:#aaa;font-family:var(--mono);font-size:0.88em;">${dateStr}</div>
      <div style="color:#666;font-size:0.84em;font-family:var(--mono);">${timeStr}</div>
      <div class="status-badge" style="color:${statusColor(l.status)};">${l.status}</div>`;
    row.addEventListener('click', () => openLaunchModal(l._idx));
    rowsWrap.appendChild(row);
  });

  acc.appendChild(header);
  acc.appendChild(rowsWrap);
  scheduleContainer.appendChild(acc);

  /* ── Smooth open/close without jerk ── */
  header.addEventListener('click', () => {
    const isOpen = acc.classList.contains('open');

    if (isOpen) {
      /* Closing: fix height first, then animate to 0 */
      rowsWrap.style.maxHeight = rowsWrap.scrollHeight + 'px';
      rowsWrap.classList.remove('open');
      requestAnimationFrame(() => {
        rowsWrap.style.maxHeight = '0px';
      });
      acc.classList.remove('open');
    } else {
      /* Opening: set target height, add class */
      acc.classList.add('open');
      rowsWrap.style.maxHeight = rowsWrap.scrollHeight + 'px';
      rowsWrap.classList.add('open');
      /* After transition, allow natural height for dynamic content */
      rowsWrap.addEventListener('transitionend', () => {
        if (acc.classList.contains('open')) rowsWrap.style.maxHeight = 'none';
      }, { once: true });
    }
  });
});
</script>

  document.documentElement.style.zoom = "1.08";
</script>
